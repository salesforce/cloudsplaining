# .github/workflows/test.yml

name: Test

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

env:
  PREK_VERSION: '0.3.x'

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          activate-environment: true
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: '1'
      - uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d # v2.0.5
        with:
          prek-version: ${{ env.PREK_VERSION }}

  ci:
    needs: prek
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          activate-environment: true
      - run: uv sync --frozen

      - name: Install the package to make sure nothing is randomly broken
        run: just build-package
      - name: Run pytest (unit tests)
        run: just unit-tests
      - name: Run mypy (static type check)
        run: just type-check

  python-version:
    needs: prek
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        python: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: ${{ matrix.python }}
          activate-environment: true
      - run: uv sync --frozen

      - name: Install the package to make sure nothing is randomly broken
        run: just build-package
      - name: Run pytest (unit tests)
        run: just unit-tests
