- id: ecs-006
  name: ecs:ExecuteCommand + ecs:DescribeTasks
  category: existing-passrole
  services:
  - ecs
  required_actions:
  - ecs:executecommand
  - ecs:describetasks
  additional_actions:
  - ecs:listclusters
  - ecs:listtasks
  - ecs:describetaskdefinition
  parent: null
  parent_modification: null
  description: A principal with `ecs:ExecuteCommand` and `ecs:DescribeTasks` can establish an interactive
    shell session in a running ECS container, but only if ECS Exec has been explicitly enabled on the
    service (it is disabled by default). Both permissions are required because the AWS CLI internally
    calls `DescribeTasks` to retrieve the container runtime ID needed to establish the SSM session. If
    the task has a privileged IAM role attached, the attacker can retrieve the role's temporary credentials
    from the container metadata service at `169.254.170.2$AWS_CONTAINER_CREDENTIALS_RELATIVE_URI` and
    use them to perform actions as that role.
  recommendation: "High powered service roles + overly permissive `iam:PassRole` is what makes this privilege\
    \ escalation path exploitable and impactful.\n\n- **Avoid administrative task roles** - Very rarely\
    \ does an ECS task need administrative access. Use the principle of least privilege for all task roles.\n\
    - **Disable ECS Exec on production services** - ECS Exec is disabled by default. Only enable it when\
    \ actively debugging, and disable immediately after. Use separate clusters for debugging and production\
    \ workloads.\n- **Restrict use of the `ecs:ExecuteCommand` permission** - When `ecs:ExecuteCommand`\
    \ is needed, restrict it's use to to specific clusters or use tag-based conditions.\n\nUse IAM policy\
    \ conditions to restrict which tasks can be accessed:\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"\
    Action\": [\n    \"ecs:ExecuteCommand\",\n    \"ecs:DescribeTasks\"\n  ],\n  \"Resource\": \"arn:aws:ecs:*:ACCOUNT_ID:task/specific-cluster/*\"\
    ,\n  \"Condition\": {\n    \"StringEquals\": {\n      \"aws:ResourceTag/AllowExec\": \"true\"\n  \
    \  }\n  }\n}\n```\n\n- Monitor CloudTrail for `ecs:ExecuteCommand` API calls, especially targeting\
    \ tasks with privileged roles\n- Monitor CloudTrail for `ecs:ExecuteCommand` API calls from principals\
    \ who do not usually access containers\n- Alert on `ecs:ExecuteCommand` API calls at unusual times\
    \ or from unexpected source IPs\n- Correlate `ecs:ExecuteCommand` API calls with subsequent API calls\
    \ using task role credentials\n- Enable CloudWatch logging for ECS Exec to capture all commands executed\
    \ within containers\n- Regularly audit ECS task definitions for excessive IAM permissions on task\
    \ roles\n- Regularly audit all ECS services to identify which have ECS Exec enabled and whether it's\
    \ necessary"
  limitations: This path provides administrative access only if the task role has administrative permissions.
    The level of access gained depends entirely on what permissions are attached to the running task's
    role. Even limited access through a task role may enable further privilege escalation or data access.
  references:
  - title: AWS - ECS Privesc - HackTricks Cloud
    url: https://cloud.hacktricks.wiki/en/pentesting-cloud/aws-security/aws-privilege-escalation/aws-ecs-privesc/index.html#ecsexecutecommand-ecsdescribetasksecsruntaskecsstarttaskecsupdateserviceecscreateservice
  - title: NEW - Using Amazon ECS Exec to access your containers on AWS Fargate and Amazon EC2
    url: https://aws.amazon.com/blogs/containers/new-using-amazon-ecs-exec-access-your-containers-fargate-ec2/
  - title: Monitor Amazon ECS containers with ECS Exec - AWS Documentation
    url: https://docs.aws.amazon.com/AmazonECS/latest/developerguide/ecs-exec.html
