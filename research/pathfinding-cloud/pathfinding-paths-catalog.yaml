- id: sts-001
  name: sts:AssumeRole
  category: principal-access
  services:
  - sts
  required_actions:
  - sts:assumerole
  additional_actions:
  - iam:listroles
  - iam:getrole
  parent: null
  parent_modification: null
  description: A principal with `sts:AssumeRole` permission can assume IAM roles that trust them in their
    trust policy. We refer to this as two-way trust, or bidirectional trust. Direction 1 is the forward
    trust - the starting principal that has `sts:AssumeRole` permission on one or more roles. Direction
    2 is the reverse trust - the target role must trust the starting principal to assume it. It's important
    to remember that if the target role trusts the account `root`, like this `arn:aws:iam::012345678901:root`,
    this trust extends to all principals in the account and satisfies direction 2. If this bidirectional
    trust is in place, the starting principal can assume the target role gain access to any elevated permissions
    by assuming the target role. However there is an edge case, noted in the prerequisites below. If the
    target role's trust policy trusts the starting principal explicitly, e.g, `arn:aws:iam::012345678901:user/startUser`,
    and that principal is in the same account as the target role, that principal does not need `sts:AssumeRole`
    permission. They just can assume the  role without any permissions.
  recommendation: "- Avoiding using the account root notation (`arn:aws:iam::012345678901:root`) for internal\
    \ accounts. This is fine to use with external accounts along with the externalID field, but is almost\
    \ always overly permissive when used for internal AWS accounts.\n- Only allow trusted principals to\
    \ assume sensitive roles. Use conditions when possible.\n\nExample restrictive trust policy:\n```json\n\
    {\n  \"Version\": \"2012-10-17\",\n  \"Statement\": [\n    {\n      \"Effect\": \"Allow\",\n     \
    \ \"Principal\": {\n        \"AWS\": \"arn:aws:iam::ACCOUNT_ID:role/SpecificTrustedRole\"\n      },\n\
    \      \"Action\": \"sts:AssumeRole\",\n      \"Condition\": {\n        \"IpAddress\": {\n       \
    \   \"aws:SourceIp\": \"1.2.3.0/24\"\n        }\n      }\n    }\n  ]\n}\n```\n\nAdditional controls:\n\
    - **Require MFA**: Require MFA for sensitive role assumptions using `aws:MultiFactorAuthPresent` condition\n\
    - **Use External IDs**: Use external IDs for third-party cross-account role assumptions to prevent\
    \ confused deputy attacks\n- **IP Address Restrictions**: Implement IP address restrictions in trust\
    \ policies using `aws:SourceIp` condition when possible.\n- **Session Policies**: Implement session\
    \ policies to limit permissions even when assuming privileged roles, providing an additional layer\
    \ of defense\n- **Monitor CloudTrail**: Alert on `AssumeRole` events on privileged roles, especially\
    \ from unexpected principals\n- **Alert on Patterns**: Alert on unusual assume-role patterns or assumptions\
    \ from unexpected IP addresses"
  limitations: This path provides administrative access only if a role exists with administrative permissions
    that trusts the starting principal to assume it. The attacker gains whatever permissions the assumed
    role has. If only limited roles are available that trust the principal, the attacker gains limited
    access. However, even limited access may enable multi-hop attacks or access to sensitive data.
  references:
  - title: AWS Privilege Escalation Methods and Mitigation
    url: https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
  - title: HackTricks - AWS - STS Privesc
    url: https://cloud.hacktricks.wiki/en/pentesting-cloud/aws-security/aws-privilege-escalation/aws-sts-privesc/index.html#stsassumerole
