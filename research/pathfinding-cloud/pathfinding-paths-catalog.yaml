- id: ecs-001
  name: iam:PassRole + ecs:CreateCluster + ecs:RegisterTaskDefinition + ecs:CreateService
  category: new-passrole
  services:
  - iam
  - ecs
  required_actions:
  - iam:passrole
  - ecs:createcluster
  - ecs:registertaskdefinition
  - ecs:createservice
  additional_actions:
  - ec2:describevpcs
  - ec2:describesubnets
  - ecs:describeservices
  - ecs:describetasks
  - ecs:listtasks
  - iam:listroles
  - iam:getrole
  parent: ecs-003
  parent_modification: Adds ecs:CreateCluster permission for scenarios where no ECS cluster exists
  description: A principal with `iam:PassRole`, `ecs:CreateCluster`, `ecs:RegisterTaskDefinition`, and
    `ecs:CreateService` can escalate privileges by creating a new ECS cluster, registering a task definition
    with a privileged IAM role, and launching the task via an ECS service. The task runs with the permissions
    of the passed role and can execute arbitrary code using the AWS CLI or SDK to modify the starting
    principal's permissions. This path is particularly useful because it works with Fargate launch type,
    eliminating the need for EC2 instance management, and the task automatically receives temporary credentials
    for the passed role.
  recommendation: "High powered service roles + overly permissive `iam:PassRole` is what makes this privilege\
    \ escalation path exploitable and impactful.\n\n- **Avoid administrative service roles** - Very rarely\
    \ does an ECS task need administrative access. Use the principle of least privilege.\n- **Avoid granting\
    \ `iam:PassRole` on all resources** - Whenever possible, restrict `iam:PassRole` to specific roles\
    \ or specific services.\n\nUse IAM policy conditions to restrict which roles can be passed and to\
    \ which services:\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:PassRole\",\n  \"Resource\"\
    : \"arn:aws:iam::ACCOUNT_ID:role/SpecificECSRole\",\n  \"Condition\": {\n    \"StringEquals\": {\n\
    \      \"iam:PassedToService\": \"ecs-tasks.amazonaws.com\"\n    }\n  }\n}\n```\n\n- Monitor CloudTrail\
    \ for unusual ECS task definition registration followed by immediate service creation\n- Monitor CloudTrail\
    \ for ECS service creation by principals who do not usually create services\n- Monitor CloudTrail\
    \ for roles being passed to ECS that haven't been used before\n- Monitor and alert on ECS service\
    \ creation with privileged roles\n- Regularly audit ECS tasks for excessive IAM permissions\n- Regularly\
    \ audit all IAM roles that trust the ECS service and down-scope any roles with administrative access"
  limitations: This path provides administrative access only if the passed role has administrative permissions
    (e.g., AdministratorAccess policy). If only limited roles are available, you gain access limited to
    those permissions. However, even limited access may enable multi-hop attacks or access to sensitive
    data.
  references:
  - title: Weaponizing AWS ECS Task Definitions to Steal Credentials From Running Containers (Original
      Research)
    url: https://rhinosecuritylabs.com/aws/weaponizing-ecs-task-definitions-steal-credentials-running-containers/
