  description: The `ssm:StartSession` permission allows a principal to remotely access any EC2 instance
    on which they have this permission. This access is contingent on the EC2 instance having the SSM agent
    installed and running, possessing the AmazonSSMManagedInstanceCore policy or equivalent permissions,
    and being in a running state. This permission provides SSH-like access via the AWS API. Consequently,
    the initiating principal may gain additional IAM permissions associated with the accessed instances.
    If an instance has a privileged IAM role attached, an attacker can abuse this permission to execute
    code that steals the credentials for that role, thereby escalating their own permissions.
  recommendation: Restrict access to `ssm:StartSession` using the principle of least privilege. Use the
    Resource and Condition elements in IAM policies to limit which instances a principal can start sessions
    on. Monitor use of this sensitive permission using CloudSIEM detections.
  limitations: This path provides administrative access only if the target resource's execution role has
    administrative permissions. The attacker gains whatever permissions the resource's role has. If the
    role has limited permissions, the attacker gains limited access. However, even limited access may
    enable multi-hop attacks or access to sensitive data.
