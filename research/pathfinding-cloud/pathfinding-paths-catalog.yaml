  description: A principal with `iam:PassRole`, `glue:CreateJob`, and `glue:CreateTrigger` can create
    an AWS Glue job with a privileged IAM role and establish a scheduled trigger that automatically executes
    the job. Unlike manual execution via `glue:StartJobRun`, this technique creates a persistent attack
    mechanism through scheduled automation. AWS Glue triggers are automation components that can start
    jobs based on schedules (cron expressions), events, or on-demand. When a trigger is created with the
    `--start-on-creation` flag, it immediately activates and begins executing the associated job according
    to its schedule (e.g., every minute). The trigger-based approach is particularly dangerous because
    it demonstrates a persistence pattern rather than just immediate exploitation. The attacker creates
    a scheduled job that continuously grants administrative access, making it harder to detect and remediate.
    This technique shows how AWS service automation features can be abused for persistent privilege escalation.
    The job executes Python code that modifies IAM permissions to grant the starting principal administrative
    access, and the trigger ensures this runs repeatedly on a schedule.
  recommendation: "High powered service roles + overly permissive `iam:PassRole` is what makes this privilege\
    \ escalation path exploitable and impactful.\n\n- **Avoid administrative service roles** - Very rarely\
    \ does a Glue job need administrative access. Use the principle of least privilege.\n- **Avoid granting\
    \ `iam:PassRole` on all resources** - Whenever possible, restrict `iam:PassRole` to specific roles\
    \ or specific services.\n\nUse IAM policy conditions to restrict which roles can be passed and to\
    \ which services:\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:PassRole\",\n  \"Resource\"\
    : \"arn:aws:iam::ACCOUNT_ID:role/SpecificGlueRole\",\n  \"Condition\": {\n    \"StringEquals\": {\n\
    \      \"iam:PassedToService\": \"glue.amazonaws.com\"\n    }\n  }\n}\n```\n\n- Monitor CloudTrail\
    \ for unusual Glue job creation followed by immediate trigger creation\n- Monitor CloudTrail for Glue\
    \ job and trigger creation by principals who do not usually create jobs\n- Monitor CloudTrail for\
    \ roles being passed to Glue that haven't been used before\n- Monitor and alert on Glue job creation\
    \ with privileged roles\n- Regularly audit Glue jobs for excessive IAM permissions\n- Regularly audit\
    \ all IAM roles that trust the Glue service and down-scope any roles with administrative access"
  limitations: This path provides administrative access only if the passed role has administrative permissions
    (e.g., AdministratorAccess policy). If only limited roles are available in the environment, you gain
    access limited to those role's permissions. However, even limited access may enable multi-hop attacks
    or access to sensitive data. The persistent nature of triggers means access can be re-granted even
    after remediation attempts if the trigger is not identified and removed.
  references:
  - title: HackingTheCloud - PassRole + Glue UpdateJob Privilege Escalation
    url: https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/#iampassrole-glueupdatejob
