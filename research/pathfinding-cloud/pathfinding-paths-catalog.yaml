- id: iam-019
  name: iam:AttachRolePolicy + iam:UpdateAssumeRolePolicy
  category: principal-access
  services:
  - iam
  required_actions:
  - iam:attachrolepolicy
  - iam:updateassumerolepolicy
  additional_actions:
  - iam:listroles
  - iam:getrole
  - iam:listattachedrolepolicies
  parent: iam-009
  parent_modification: This variation combines iam:AttachRolePolicy with iam:UpdateAssumeRolePolicy to
    both elevate a role's permissions and modify its trust policy, eliminating the need for pre-existing
    trust policy configuration or sts:AssumeRole permission
  description: A principal with `iam:AttachRolePolicy` and `iam:UpdateAssumeRolePolicy` can achieve privilege
    escalation by modifying an existing IAM role. The attacker first uses `iam:AttachRolePolicy` to attach
    an administrative managed policy to a target role, then uses `iam:UpdateAssumeRolePolicy` to modify
    the role's trust policy to allow the attacker to assume it. Once the trust policy is updated, the
    attacker can assume the role using `sts:AssumeRole` to gain the elevated privileges. A key aspect
    of this attack is that the attacker does not need pre-existing `sts:AssumeRole` permission - being
    explicitly named in the trust policy grants the ability to assume the role from AWS's perspective,
    as trust policies grant permission from the role's side rather than requiring it on the principal's
    side.
  recommendation: "Restrict `iam:AttachRolePolicy` and `iam:UpdateAssumeRolePolicy` using the principle\
    \ of least privilege. These permissions should rarely be granted together on the same target role,\
    \ as this combination creates a direct privilege escalation path.\n\n**Prevention strategies:**\n\n\
    1. Restrict `iam:AttachRolePolicy` to limit which policies can be attached and to which roles:\n```json\n\
    {\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:AttachRolePolicy\",\n  \"Resource\": \"arn:aws:iam::ACCOUNT:role/SpecificRole\"\
    ,\n  \"Condition\": {\n    \"ArnEquals\": {\n      \"iam:PolicyArn\": [\n        \"arn:aws:iam::ACCOUNT:policy/AllowedPolicy1\"\
    ,\n        \"arn:aws:iam::ACCOUNT:policy/AllowedPolicy2\"\n      ]\n    }\n  }\n}\n```\n\n2. Restrict\
    \ `iam:UpdateAssumeRolePolicy` to prevent arbitrary trust policy modifications:\n```json\n{\n  \"\
    Effect\": \"Allow\",\n  \"Action\": \"iam:UpdateAssumeRolePolicy\",\n  \"Resource\": \"arn:aws:iam::ACCOUNT:role/SpecificRole\"\
    ,\n  \"Condition\": {\n    \"StringEquals\": {\n      \"aws:RequestedRegion\": \"us-east-1\"\n   \
    \ }\n  }\n}\n```\n\n3. Use IAM permissions boundaries to limit the maximum permissions a role can\
    \ have, even if administrative policies are attached\n\n4. Separate the permissions - avoid granting\
    \ both `iam:AttachRolePolicy` and `iam:UpdateAssumeRolePolicy` to the same principal for the same\
    \ target role\n\n5. Require MFA for sensitive role policy attachment and trust policy modification\
    \ operations\n\n6. Use AWS Config rules to detect and alert on role policy attachments and trust policy\
    \ changes\n\n7. Use Service Control Policies (SCPs) to prevent the attachment of overly permissive\
    \ managed policies or to restrict trust policy modifications\n\n**Detection strategies:**\n\nMonitor\
    \ CloudTrail for the following event patterns:\n- `AttachRolePolicy` API calls, especially when attaching\
    \ AWS-managed admin policies like AdministratorAccess\n- `UpdateAssumeRolePolicy` API calls that add\
    \ new principals to role trust policies\n- Sequential occurrences of `AttachRolePolicy` followed by\
    \ `UpdateAssumeRolePolicy` on the same role within a short time window\n- `AssumeRole` API calls immediately\
    \ following trust policy updates\n- `UpdateAssumeRolePolicy` events where new principals are added\
    \ to the trust policy\n\nSet up CloudWatch alarms for unexpected changes to role policies and trust\
    \ policies. Investigate any role policy attachments combined with trust policy modifications. Consider\
    \ implementing automated responses to roll back suspicious policy changes or to quarantine affected\
    \ roles."
  limitations: This attack path provides administrative access only if an administrative managed policy
    (e.g., AdministratorAccess) exists in the AWS account to attach. If only limited managed policies
    are available, the attacker gains access limited to those permissions. However, even limited privilege
    escalation may enable multi-hop attacks or access to sensitive data.
  references:
  - title: HackTricks - AWS - IAM Privesc
    url: https://cloud.hacktricks.wiki/en/pentesting-cloud/aws-security/aws-privilege-escalation/aws-iam-privesc/index.html#iamupdateassumerolepolicy
  relatedPaths: []
  cloudsplaining_coverage:
