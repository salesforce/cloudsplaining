  parent: null
  parent_modification: null
  description: A principal with `iam:PassRole`, `glue:CreateJob`, and `glue:StartJobRun` can create an
    AWS Glue job with a privileged IAM role and execute Python code that modifies IAM permissions. AWS
    Glue jobs are serverless ETL (Extract, Transform, Load) workloads that run Python or Scala scripts
    in a managed environment. When creating a Glue job, an IAM role must be assigned that grants permissions
    to the job's execution environment. If an attacker can pass a privileged role to a Glue job and control
    the job's code (via S3 script location or inline commands), they can execute arbitrary Python code
    with administrative permissions to attach policies, create access keys, or perform other IAM modifications.
    This is a cost-effective attack method (~$0.44/DPU-hour with 0.0625 DPU minimum for Python shell jobs)
    that executes quickly (1-2 minutes) and is more practical than using Glue development endpoints (~$2.20/hour).
    The attacker creates a job with malicious Python code, passes an administrative role during job creation,
    manually starts the job execution, and the job modifies IAM permissions to grant the starting principal
    administrative access.
  recommendation: "High powered service roles + overly permissive `iam:PassRole` is what makes this privilege\
    \ escalation path exploitable and impactful.\n\n- **Avoid administrative service roles** - Very rarely\
    \ does a Glue job need administrative access. Use the principle of least privilege.\n- **Avoid granting\
    \ `iam:PassRole` on all resources** - Whenever possible, restrict `iam:PassRole` to specific roles\
    \ or specific services.\n\nUse IAM policy conditions to restrict which roles can be passed and to\
    \ which services:\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:PassRole\",\n  \"Resource\"\
    : \"arn:aws:iam::ACCOUNT_ID:role/SpecificGlueRole\",\n  \"Condition\": {\n    \"StringEquals\": {\n\
    \      \"iam:PassedToService\": \"glue.amazonaws.com\"\n    }\n  }\n}\n```\n\n- Monitor CloudTrail\
    \ for unusual Glue job creation followed by immediate execution\n- Monitor CloudTrail for Glue job\
    \ creation by principals who do not usually create jobs\n- Monitor CloudTrail for roles being passed\
    \ to Glue that haven't been used before\n- Monitor and alert on Glue job creation with privileged\
    \ roles\n- Regularly audit Glue jobs for excessive IAM permissions\n- Regularly audit all IAM roles\
    \ that trust the Glue service and down-scope any roles with administrative access"
  limitations: This path provides administrative access only if the passed role has administrative permissions
    (e.g., AdministratorAccess policy). If only limited roles are available in the environment, you gain
    access limited to those role's permissions. However, even limited access may enable multi-hop attacks
    or access to sensitive data.
  references:
  - title: HackingTheCloud - PassRole + Glue CreateJob Privilege Escalation
    url: https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/#iampassrole-gluecreatejob
