  description: A principal with `glue:UpdateDevEndpoint` can update an existing Glue development endpoint
    to add their SSH public key, granting them SSH access to the endpoint. Since the endpoint executes
    with the permissions of its attached IAM role, the attacker gains the privileges of that role. This
    path doesn't require `iam:PassRole` as the role is already attached.
  recommendation: "Restrict access to `glue:UpdateDevEndpoint` using the principle of least privilege.\n\
    \n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"glue:UpdateDevEndpoint\",\n  \"Resource\"\
    : \"arn:aws:glue:REGION:ACCOUNT_ID:devEndpoint/SpecificEndpoint\"\n}\n```\n\nAdditional controls:\n\
    - Monitor CloudTrail for UpdateDevEndpoint API calls\n- Alert on public key additions to dev endpoints\n\
    - Regularly audit dev endpoint SSH keys\n- Implement automated remediation for unauthorized key additions\n\
    - Consider using session-based access instead of SSH keys"
  limitations: This path provides administrative access only if the target resource's execution role has
    administrative permissions. The attacker gains whatever permissions the resource's role has. If the
    role has limited permissions, the attacker gains limited access. However, even limited access may
    enable multi-hop attacks or access to sensitive data.
