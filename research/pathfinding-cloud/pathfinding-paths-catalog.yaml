    \ updates by principals who do not usually update jobs\n- Monitor CloudTrail for roles being passed\
    \ to Glue that haven't been used before\n- Monitor and alert on Glue job updates with privileged roles\n\
    - Regularly audit Glue jobs for excessive IAM permissions\n- Regularly audit all IAM roles that trust\
    \ the Glue service and down-scope any roles with administrative access"
  limitations: This path provides administrative access only if the passed role has administrative permissions
    (e.g., AdministratorAccess policy). If only limited roles are available in the environment, you gain
    access limited to those role's permissions. However, even limited access may enable multi-hop attacks
    or access to sensitive data.
