- id: cloudformation-004
  name: iam:PassRole + cloudformation:UpdateStackSet
  category: new-passrole
  services:
  - iam
  - cloudformation
  required_actions:
  - iam:passrole
  - cloudformation:updatestackset
  additional_actions:
  - cloudformation:describestackset
  - cloudformation:describestacksetoperation
  - cloudformation:gettemplate
  - cloudformation:liststackinstances
  - iam:getrole
  parent: null
  parent_modification: null
  description: A principal with `iam:PassRole` and `cloudformation:UpdateStackSet` can escalate privileges
    by modifying an existing CloudFormation StackSet that has a privileged execution role. Both permissions
    are required for this attack - `cloudformation:UpdateStackSet` alone is insufficient because the UpdateStackSet
    API call requires passing the administration role ARN, which necessitates the `iam:PassRole` permission.
    CloudFormation StackSets deploy infrastructure across multiple AWS accounts and regions using an execution
    role in each target account to perform resource creation and modification. When an attacker can update
    a StackSet's template and pass the required administration role, they can add any AWS resources that
    the execution role has permissions to create. By adding IAM resources such as roles with elevated
    permissions and trust policies allowing the attacker to assume them, the attacker leverages the StackSet's
    execution role privileges to create resources they couldn't create directly. Once the updated template
    is deployed to stack instances, the attacker can assume the newly created resources to gain administrative
    access.
  recommendation: "High powered service roles + overly permissive `iam:PassRole` is what makes this privilege\
    \ escalation path exploitable and impactful.\n\n- **Avoid administrative service roles** - Very rarely\
    \ does a CloudFormation StackSet need administrative access. Use the principle of least privilege.\n\
    - **Avoid granting `iam:PassRole` on all resources** - Whenever possible, restrict `iam:PassRole`\
    \ to specific roles or specific services.\n\nUse IAM policy conditions to restrict which roles can\
    \ be passed and to which services:\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:PassRole\"\
    ,\n  \"Resource\": \"arn:aws:iam::ACCOUNT_ID:role/SpecificCloudFormationRole\",\n  \"Condition\":\
    \ {\n    \"StringEquals\": {\n      \"iam:PassedToService\": \"cloudformation.amazonaws.com\"\n  \
    \  }\n  }\n}\n```\n\n- Monitor CloudTrail for unusual CloudFormation StackSet updates followed by\
    \ immediate resource creation\n- Monitor CloudTrail for StackSet updates by principals who do not\
    \ usually update StackSets\n- Monitor CloudTrail for roles being passed to CloudFormation that haven't\
    \ been used before\n- Monitor and alert on CloudFormation StackSet updates with privileged roles\n\
    - Regularly audit CloudFormation StackSets for excessive IAM permissions\n- Regularly audit all IAM\
    \ roles that trust the CloudFormation service and down-scope any roles with administrative access"
