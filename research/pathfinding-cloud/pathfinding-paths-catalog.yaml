- id: ec2-004
  name: ec2:CreateLaunchTemplateVersion + ec2:ModifyLaunchTemplate
  category: existing-passrole
  services:
  - ec2
  - iam
  required_actions:
  - ec2:createlaunchtemplateversion
  - ec2:modifylaunchtemplate
  additional_actions:
  - ec2:describelaunchtemplates
  - ec2:describelaunchtemplateversions
  - iam:listroles
  - iam:listinstanceprofiles
  - autoscaling:describeautoscalinggroups
  - ec2:describeinstances
  - autoscaling:setdesiredcapacity
  parent: null
  parent_modification: null
  description: A principal with `ec2:CreateLaunchTemplateVersion` and `ec2:ModifyLaunchTemplate` permissions
    can escalate privileges by modifying an existing launch template that already references a privileged
    IAM role. The attacker creates a new template version that keeps the existing privileged role reference
    but injects malicious user data, then sets this version as the default. Crucially, this attack does
    NOT require `iam:PassRole` permissions because the attacker is simply referencing a role that already
    exists in a previous template version. When the next EC2 instance launches from the template (via
    Auto Scaling Groups, scheduled tasks, or manual launches), it automatically receives the privileged
    role and executes the malicious user data script, which can grant the attacker persistent administrative
    access. This is particularly dangerous in environments with auto-scaling policies or scheduled instance
    launches, where the malicious configuration may activate without any further attacker interaction.
    EC2 launch templates are commonly used with Auto Scaling Groups to define instance configuration including
    AMI, instance type, security groups, IAM instance profile, and user data scripts.
  recommendation: "Restrict `ec2:CreateLaunchTemplateVersion` and `ec2:ModifyLaunchTemplate` permissions\
    \ using resource-based policies to limit which templates can be modified:\n\n{\n  \"Effect\": \"Allow\"\
    ,\n  \"Action\": [\n    \"ec2:CreateLaunchTemplateVersion\",\n    \"ec2:ModifyLaunchTemplate\"\n \
    \ ],\n  \"Resource\": \"arn:aws:ec2:*:ACCOUNT:launch-template/specific-template-id\",\n  \"Condition\"\
    : {\n    \"StringEquals\": {\n      \"aws:ResourceTag/Environment\": \"dev\"\n    }\n  }\n}\n\nUse\
    \ Service Control Policies (SCPs) to prevent launch template modifications in production environments\
    \ unless from approved automation roles.\n\nMonitor CloudTrail for `CreateLaunchTemplateVersion` and\
    \ `ModifyLaunchTemplate` API calls, especially on templates that reference privileged instance profiles.\
    \ Alert when default versions are changed.\n\nPin Auto Scaling Groups to specific launch template\
    \ versions (e.g., `$Latest` or version number) rather than using `$Default`, preventing automatic\
    \ use of modified default versions.\n\nMonitor EC2 user data for suspicious IAM-related commands using\
    \ AWS Config rules or custom Lambda functions that inspect new template versions.\n\nRegularly audit\
    \ existing launch templates to identify those with privileged instance profiles and restrict modification\
    \ permissions to only necessary principals.\n\nImplement approval workflows for launch template changes\
    \ using AWS Service Catalog or custom automation with human approval steps.\n\nEnable MFA requirements\
    \ for sensitive operations like launch template modifications using `aws:MultiFactorAuthPresent` condition\
    \ keys.\n\nUse IAM Access Analyzer to identify principals with template modification permissions on\
    \ templates containing privileged roles.\n\nConsider using EC2 Image Builder with locked-down instance\
    \ profiles instead of relying on user data for configuration."
  limitations: 'This path provides administrative access only if the target launch template already references
    a role with administrative permissions. If the existing template only references roles with limited
    permissions, the attacker gains access limited to those permissions.


    Importantly, this attack does NOT require `iam:PassRole` permissions because the attacker is simply
    referencing an IAM role that already exists in a previous template version. This makes it harder to
    detect than traditional PassRole-based attacks.'
  references:
  - title: AWS EC2 Launch Templates Documentation
    url: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ec2-launch-templates.html
  - title: AWS Privilege Escalation Methods - Rhino Security Labs
    url: https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
  - title: HackTricks - AWS - EC2 Privesc
    url: https://cloud.hacktricks.wiki/en/pentesting-cloud/aws-security/aws-privilege-escalation/aws-ec2-privesc/index.html#ec2createlaunchtemplateversionec2createlaunchtemplateec2modifylaunchtemplate
  relatedPaths:
  - ec2-001
  - ec2-002
  - ec2-003
