- id: lambda-006
  name: iam:PassRole + lambda:CreateFunction + lambda:AddPermission
  category: new-passrole
  services:
  - iam
  - lambda
  required_actions:
  - iam:passrole
  - lambda:createfunction
  - lambda:addpermission
  additional_actions:
  - iam:listroles
  - iam:getrole
  - iam:listattachedrolepolicies
  - lambda:getfunction
  - lambda:getpolicy
  - lambda:deletefunction
  parent: null
  parent_modification: null
  description: A principal with `iam:PassRole`, `lambda:CreateFunction`, and `lambda:AddPermission` can
    create a new Lambda function with a privileged execution role and grant themselves permission to invoke
    it via the resource-based policy. The attacker does not need `lambda:InvokeFunction` as an IAM permission
    because `lambda:AddPermission` grants invocation rights through the function's resource-based policy.
    This bypasses IAM permission restrictions and allows the attacker to execute malicious code under
    the privileged role's credentials, making this attack more resilient than paths that require `lambda:InvokeFunction`
    in the starting principal's IAM policies.
  recommendation: "High powered service roles + overly permissive `iam:PassRole` is what makes this privilege\
    \ escalation path exploitable and impactful.\n\n- **Avoid administrative service roles** - Very rarely\
    \ does a Lambda function need administrative access. Use the principle of least privilege.\n- **Avoid\
    \ granting `iam:PassRole` on all resources** - Whenever possible, restrict `iam:PassRole` to specific\
    \ roles or specific services.\n\nUse IAM policy conditions to restrict which roles can be passed and\
    \ to which services:\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:PassRole\",\n  \"\
    Resource\": \"arn:aws:iam::ACCOUNT_ID:role/SpecificLambdaRole\",\n  \"Condition\": {\n    \"StringEquals\"\
    : {\n      \"iam:PassedToService\": \"lambda.amazonaws.com\"\n    }\n  }\n}\n```\n\n- Monitor CloudTrail\
    \ for unusual Lambda function creation followed by immediate invocation via resource-based policy\n\
    - Monitor CloudTrail for Lambda function creation by principals who do not usually create functions\n\
    - Monitor CloudTrail for roles being passed to Lambda that haven't been used before\n- Monitor and\
    \ alert on Lambda function creation with privileged roles\n- Regularly audit Lambda functions for\
    \ excessive IAM permissions\n- Regularly audit all IAM roles that trust the Lambda service and down-scope\
    \ any roles with administrative access"
  limitations: This path provides administrative access only if the passed role has administrative permissions
    (e.g., AdministratorAccess or equivalent custom policies). If only limited roles are available in
    the environment, you gain access limited to those role's permissions. However, even limited access
    may enable multi-hop attacks or access to sensitive data stores.
