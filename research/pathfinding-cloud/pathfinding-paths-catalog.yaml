paths:
- id: apprunner-001
  name: iam:PassRole + apprunner:CreateService
  category: new-passrole
  services:
  - iam
  - apprunner
  required_actions:
  - iam:passrole
  - apprunner:createservice
  additional_actions:
  - iam:listroles
  - iam:getrole
  parent: null
  parent_modification: null
  description: A principal with `iam:PassRole` and `apprunner:CreateService` can create an AWS App Runner
    service with a privileged IAM role attached. The service runs with the attached role's permissions,
    and the attacker has multiple ways to leverage these permissions. They can configure a StartCommand
    to execute AWS CLI commands when the service starts, deploy a container with a web shell or reverse
    shell to access the role's credentials via the container metadata service, or use a repository with
    an apprunner.yaml file containing malicious commands. This technique provides direct privilege escalation
    to any IAM role that can be attached to App Runner services.
  recommendation: "High powered service roles + overly permissive `iam:PassRole` is what makes this privilege\
    \ escalation path exploitable and impactful.\n\n- **Avoid administrative service roles** - Very rarely\
    \ does an App Runner service need administrative access. Use the principle of least privilege.\n-\
    \ **Avoid granting `iam:PassRole` on all resources** - Whenever possible, restrict `iam:PassRole`\
    \ to specific roles or specific services.\n\nUse IAM policy conditions to restrict which roles can\
    \ be passed and to which services:\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:PassRole\"\
    ,\n  \"Resource\": \"arn:aws:iam::ACCOUNT_ID:role/SpecificAppRunnerRole\",\n  \"Condition\": {\n \
    \   \"StringEquals\": {\n      \"iam:PassedToService\": \"apprunner.amazonaws.com\"\n    }\n  }\n\
    }\n```\n\n- Monitor CloudTrail for unusual App Runner service creation followed by immediate execution\n\
    - Monitor CloudTrail for service creation by principals who do not usually create services\n- Monitor\
    \ CloudTrail for roles being passed to App Runner that haven't been used before\n- Monitor and alert\
    \ on App Runner service creation with privileged roles\n- Regularly audit App Runner services for\
    \ excessive IAM permissions\n- Regularly audit all IAM roles that trust the App Runner service and\
    \ down-scope any roles with administrative access"
  limitations: This path provides administrative access only if the passed role has administrative permissions
    (e.g., AdministratorAccess or an equivalent custom policy). If only limited roles are available, you
    gain access limited to those permissions. However, even limited access may enable multi-hop attacks
    or access to sensitive data.
  references:
  - title: Getting Shell and Data Access in AWS App Runner
    url: https://blog.appsecco.com/getting-shell-and-data-access-in-aws-app-runner-3632e844bc77
  - title: HackTricks Cloud - AWS App Runner Privilege Escalation
    url: https://cloud.hacktricks.wiki/en/pentesting-cloud/aws-security/aws-privilege-escalation/aws-apprunner-privesc/index.html#iampassrole-apprunnercreateservice
  relatedPaths:
  - apprunner-002
  - lambda-001
  - ec2-001
  cloudsplaining_coverage:
    status: new
    exact_match_methods: []
    subset_existing_methods: []
    credential_action_hits: []
- id: apprunner-002
  name: apprunner:UpdateService
  category: existing-passrole
  services:
  - apprunner
  required_actions:
  - apprunner:updateservice
  additional_actions: []
  parent: null
  parent_modification: null
  description: A principal with `apprunner:UpdateService` can modify an existing App Runner service's
    configuration. If the target service has a privileged IAM role attached, the attacker can update the
    service to leverage the attached role's permissions. They have multiple ways to exploit this, including
    configuring a StartCommand to execute AWS CLI commands when the service redeploys, updating to a container
    image with a web shell or reverse shell to access the role's credentials via the container metadata
    service, or pointing to a repository with a malicious apprunner.yaml file. This is similar to `lambda:UpdateFunctionCode`
    but for containerized applications. Unlike creating a new service, this doesn't require `iam:PassRole`
    since the role is already attached to the existing service.
  recommendation: "Restrict the `apprunner:UpdateService` permission using resource-based constraints.\n\
    \n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"apprunner:UpdateService\",\n  \"Resource\"\
    : \"arn:aws:apprunner:REGION:ACCOUNT_ID:service/SpecificService/HASH\"\n}\n```\n\nAdditional controls:\n\
    - Monitor CloudTrail for `UpdateService` events on sensitive App Runner services\n- Alert on changes\
    \ to StartCommand, especially those executing IAM, STS, or security-related commands\n- Implement\
    \ container image scanning and require signed images\n- Only allow images from approved ECR repositories\
    \ using conditions (consider blocking public ECR if not needed)\n- Alert on source configuration changes\
    \ to services with privileged roles\n- Use AWS Config to detect unauthorized service updates\n- Implement\
    \ deployment approvals for production services\n- Enable auto-deployments only from trusted source\
    \ repositories"
  limitations: This path provides administrative access only if the target resource's execution role has
    administrative permissions. The attacker gains whatever permissions the resource's role has. If the
    role has limited permissions, the attacker gains limited access. However, even limited access may
    enable multi-hop attacks or access to sensitive data.
  references:
  - title: Getting Shell and Data Access in AWS App Runner
    url: https://blog.appsecco.com/getting-shell-and-data-access-in-aws-app-runner-3632e844bc77
  relatedPaths:
  - apprunner-001
  - lambda-003
  - glue-002
