- id: iam-005
  name: iam:PutRolePolicy
  category: self-escalation
  services:
  - iam
  required_actions:
  - iam:putrolepolicy
  additional_actions:
  - iam:getrolepolicy
  - iam:listrolepolicies
  parent: null
  parent_modification: null
  description: A principal with `iam:PutRolePolicy` can attach inline policies to any role they have this
    permission on. This permission is frequently exploited by a principal to grant themselves additional
    privileges. For self-escalation, the role can attach an inline policy to itself with any permissions,
    including full administrative access. A principal can also leverage this to escalate the permissions
    of another principal they can access.
  recommendation: "Restrict access to `iam:PutRolePolicy` using the principle of least privilege. Very\
    \ few principals need this permission, so it should be restricted to only the few principals that\
    \ need it.\n\nUse IAM policy conditions to restrict which roles can have policies attached:\n\n```json\n\
    {\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:PutRolePolicy\",\n  \"Resource\": \"arn:aws:iam::ACCOUNT_ID:role/SpecificRole\"\
    \n}\n```\n\nMonitor use of this sensitive permission using CloudTrail and SIEM detections:\n- Alert\
    \ on `PutRolePolicy` API calls, especially when the actor and target role are the same (self-escalation)\n\
    - Monitor for policy documents containing broad permissions like `\"Action\": \"*\"`\n- Look for usage\
    \ anomalies (principals who don't normally use this permission)\n- Review inline policies regularly\
    \ for overly permissive statements"
  limitations: This path provides administrative access because the attacker controls the policy document
    content. The attacker can embed any permissions directly into the principal, guaranteeing administrative
    access regardless of what policies exist in the environment. However, even limited additional permissions
    may enable multi-hop attacks.
  references:
  - title: AWS Privilege Escalation Methods and Mitigation
    url: https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
  - title: HackTricks - AWS - IAM Privesc
