- id: sagemaker-005
  name: sagemaker:CreateNotebookInstanceLifecycleConfig + sagemaker:StopNotebookInstance + sagemaker:UpdateNotebookInstance
    + sagemaker:StartNotebookInstance
  category: existing-passrole
  services:
  - sagemaker
