- id: iam-001
  name: iam:CreatePolicyVersion
  category: self-escalation
  services:
  - iam
  required_actions:
  - iam:createpolicyversion
  additional_actions: []
  parent: null
  parent_modification: null
  description: Anyone with access to `iam:CreatePolicyVersion` can create a new version of an IAM policy.
    If a user can create a new version of a policy that is already attached to them, they can grant themselves
    administrative privileges by creating a new policy version with elevated permissions and setting it
    as the default version. A principal can also leverage this to escalate the permissions of another
    principal they can access.
  recommendation: Restrict access to `iam:CreatePolicyVersion` using the principle of least privilege.
    Very few principals need this permission, so it should be restricted to only the few principals that
    need it. Monitor use of this sensitive permission using CloudSIEM detections, and look for usage anomalies.
  limitations: This path provides administrative access when the attacker creates a policy version with
    administrative permissions. The attacker can specify any permissions in the new policy version. However,
    even limited additional permissions may enable multi-hop attacks.
  references:
  - title: AWS Privilege Escalation Methods and Mitigation
