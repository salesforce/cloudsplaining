  recommendation: Restrict access to `iam:PutGroupPolicy` using the principle of least privilege. Very
    few principals need this permission, so it should be restricted to only the few principals that need
    it. Monitor use of this sensitive permission using CloudSIEM detections, and look for usage anomalies.
  limitations: This path provides administrative access because the attacker controls the policy document
    content. The attacker can embed any permissions directly into the principal, guaranteeing administrative
    access regardless of what policies exist in the environment. However, even limited additional permissions
    may enable multi-hop attacks.
