    it can gain full control over the instance. The `ec2:ModifyInstanceAttribute` permission can be used
    to change an instance's userData, which is a script that normally runs on the initial boot. However
    with a specially crafted payload, a modified userData script can be coerced to run on subsequent restarts.
    To modify the userData of a running instance, it must first be stopped. The attacker can inject a
    malicious script (e.g., for a reverse shell) into the userData, and then start the instance to trigger
    its execution. This provides the attacker with code execution on the machine, allowing them to steal
    the credentials of any attached IAM role.
  recommendation: The combination of `ec2:ModifyInstanceAttribute`, `ec2:StopInstances`, and `ec2:StartInstances`
    is highly sensitive. IAM policies should avoid granting these permissions together, especially with
    wildcard resources. If necessary, use the Resource element in IAM policies to strictly limit these
    actions to a specific, intended set of instances. Monitor CloudTrail logs for this sequence of API
    calls.
  limitations: This path provides administrative access only if the target resource's execution role has
    administrative permissions. The attacker gains whatever permissions the resource's role has. If the
    role has limited permissions, the attacker gains limited access. However, even limited access may
    enable multi-hop attacks or access to sensitive data.
  references:
  - title: Bishop Fox Blog - Privilege Escalation in AWS
    url: https://bishopfox.com/blog/privilege-escalation-in-aws
  - title: HackTricks - AWS - EC2 Privesc
    url: https://cloud.hacktricks.wiki/en/pentesting-cloud/aws-security/aws-privilege-escalation/aws-ec2-privesc/index.html#ec2modifyinstanceattribute
