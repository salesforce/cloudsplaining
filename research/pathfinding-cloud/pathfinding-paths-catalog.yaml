- id: cloudformation-003
  name: iam:PassRole + cloudformation:CreateStackSet + cloudformation:CreateStackInstances
  category: new-passrole
  services:
  - iam
  - cloudformation
  required_actions:
  - iam:passrole
  - cloudformation:createstackset
  - cloudformation:createstackinstances
  additional_actions:
  - cloudformation:describestackset
  - cloudformation:describestacksetoperation
  - cloudformation:liststackinstances
  - iam:listroles
  - iam:getrole
  parent: null
  parent_modification: null
  description: A principal with `iam:PassRole`, `cloudformation:CreateStackSet`, and `cloudformation:CreateStackInstances`
    can escalate privileges by creating a CloudFormation StackSet with a privileged execution role and
    then deploying stack instances to execute the malicious template. CloudFormation StackSets use a two-step
    process - `CreateStackSet` defines the template and configuration but does not actually deploy any
    resources, while `CreateStackInstances` deploys the StackSet to specific target accounts and regions,
    which triggers the actual resource creation. Both permissions are required for the attack - without
    `CreateStackInstances`, the StackSet remains just a definition and no malicious resources are created.
    StackSets use two roles - an administration role (used by the CloudFormation service) and an execution
    role (used to perform the actual resource creation in each target account). When an attacker passes
    a privileged execution role and deploys stack instances, they gain the ability to create any AWS resources
    that execution role has permissions for by defining those resources in the template. This commonly
    includes IAM resources such as roles with elevated permissions and trust policies allowing the attacker
    to assume them, effectively enabling the attacker to inherit the execution role's privileges and gain
    administrative access to the target accounts.
  recommendation: "High powered service roles + overly permissive `iam:PassRole` is what makes this privilege\
    \ escalation path exploitable and impactful.\n\n- **Avoid administrative service roles** - Very rarely\
    \ does a CloudFormation StackSet need administrative access. Use the principle of least privilege.\n\
    - **Avoid granting `iam:PassRole` on all resources** - Whenever possible, restrict `iam:PassRole`\
    \ to specific roles or specific services.\n\nUse IAM policy conditions to restrict which roles can\
    \ be passed and to which services:\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:PassRole\"\
    ,\n  \"Resource\": \"arn:aws:iam::ACCOUNT_ID:role/SpecificCloudFormationRole\",\n  \"Condition\":\
    \ {\n    \"StringEquals\": {\n      \"iam:PassedToService\": \"cloudformation.amazonaws.com\"\n  \
    \  }\n  }\n}\n```\n\n- Monitor CloudTrail for unusual CloudFormation StackSet creation followed by\
    \ immediate resource deployment\n- Monitor CloudTrail for StackSet creation by principals who do not\
    \ usually create StackSets\n- Monitor CloudTrail for roles being passed to CloudFormation that haven't\
    \ been used before\n- Monitor and alert on CloudFormation StackSet creation with privileged roles\n\
    - Regularly audit CloudFormation StackSets for excessive IAM permissions\n- Regularly audit all IAM\
    \ roles that trust the CloudFormation service and down-scope any roles with administrative access"
  limitations: This path provides administrative access only if the passed execution role has administrative
    permissions (e.g., AdministratorAccess policy). If only limited roles are available, you gain access
    limited to those permissions. However, even limited access may enable multi-hop attacks or access
    to sensitive data.
  references:
  - title: AWS IAM Privilege Escalation – Methods and Mitigation - Rhino Security Labs
    url: https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
  - title: How to implement the principle of least privilege with CloudFormation StackSets - AWS Security
      Blog
    url: https://aws.amazon.com/blogs/security/how-to-implement-the-principle-of-least-privilege-with-cloudformation-stacksets/
  - title: Grant self-managed permissions - AWS CloudFormation Documentation
    url: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/stacksets-prereqs-self-managed.html
  relatedPaths:
  - cloudformation-001
  - cloudformation-002
  - cloudformation-004
  cloudsplaining_coverage:
