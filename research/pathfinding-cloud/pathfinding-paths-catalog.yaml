- id: bedrock-001
  name: iam:PassRole + bedrock-agentcore:CreateCodeInterpreter + bedrock-agentcore:StartCodeInterpreterSession
    + bedrock-agentcore:InvokeCodeInterpreter
  category: new-passrole
  services:
  - iam
  - bedrock-agentcore
  required_actions:
  - iam:passrole
  - bedrock-agentcore:createcodeinterpreter
  - bedrock-agentcore:startcodeinterpretersession
  - bedrock-agentcore:invokecodeinterpreter
  additional_actions:
  - iam:listroles
  - iam:getrole
  - bedrock-agentcore:getcodeinterpreter
  parent: null
  parent_modification: null
  description: A principal with `iam:PassRole`, `bedrock-agentcore:CreateCodeInterpreter`, `bedrock-agentcore:StartCodeInterpreterSession`,
    and `bedrock-agentcore:InvokeCodeInterpreter` can create and invoke an AWS Bedrock AgentCore code
    interpreter with a privileged IAM execution role. Code interpreters run on Firecracker MicroVMs and
    can access the MicroVM Metadata Service (MMDS) at 169.254.169.254, similar to EC2's IMDS. By creating
    a code interpreter with a privileged role and invoking arbitrary Python code within it, an attacker
    can retrieve temporary credentials from the metadata service and gain the full permissions of the
    execution role.
  recommendation: "High powered service roles + overly permissive `iam:PassRole` is what makes this privilege\
    \ escalation path exploitable and impactful.\n\n- **Avoid administrative service roles** - Very rarely\
    \ does a Bedrock code interpreter need administrative access. Use the principle of least privilege.\n\
    - **Avoid granting `iam:PassRole` on all resources** - Whenever possible, restrict `iam:PassRole`\
    \ to specific roles or specific services.\n\nUse IAM policy conditions to restrict which roles can\
    \ be passed and to which services:\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:PassRole\"\
    ,\n  \"Resource\": \"arn:aws:iam::ACCOUNT_ID:role/SpecificBedrockRole\",\n  \"Condition\": {\n   \
    \ \"StringEquals\": {\n      \"iam:PassedToService\": \"bedrock-agentcore.amazonaws.com\"\n    }\n\
    \  }\n}\n```\n\n- Monitor CloudTrail for unusual Bedrock code interpreter creation followed by immediate\
    \ invocation\n- Monitor CloudTrail for code interpreter creation by principals who do not usually\
    \ create interpreters\n- Monitor CloudTrail for roles being passed to Bedrock that haven't been used\
    \ before\n- Monitor and alert on Bedrock code interpreter creation with privileged roles\n- Regularly\
    \ audit Bedrock code interpreters for excessive IAM permissions\n- Regularly audit all IAM roles that\
    \ trust the Bedrock service and down-scope any roles with administrative access"
  limitations: This path provides administrative access only if the passed role has administrative permissions
    (e.g., AdministratorAccess or an equivalent custom policy). If only limited roles are available, you
    gain access limited to those permissions. However, even limited access may enable multi-hop attacks
    or access to sensitive data.
  references:
  - title: 'AWS AgentCore: The Overlooked Privilege Escalation Path in Bedrock AI Tooling'
    url: https://sonraisecurity.com/blog/aws-agentcore-privilege-escalation-bedrock-scp-fix/
  - title: 'Sandboxed to Compromised: New Research Exposes Credential Exfiltration Paths in AWS Code Interpreters'
    url: https://sonraisecurity.com/blog/sandboxed-to-compromised-new-research-exposes-credential-exfiltration-paths-in-aws-code-interpreters/
  - title: Understanding Credentials Management in Amazon Bedrock AgentCore
    url: https://docs.aws.amazon.com/bedrock-agentcore/latest/devguide/security-credentials-management.html
  relatedPaths:
  - bedrock-002
  - lambda-001
  - ec2-001
  - sagemaker-001
