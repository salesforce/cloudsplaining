- id: iam-015
  name: iam:AttachUserPolicy + iam:CreateAccessKey
  category: principal-access
  services:
  - iam
  required_actions:
  - iam:attachuserpolicy
  - iam:createaccesskey
  additional_actions:
  - iam:listusers
  - iam:getuser
  - iam:listattacheduserpolicies
  - iam:listaccesskeys
  - iam:listpolicies
  parent: iam-008
  parent_modification: This variation combines iam:AttachUserPolicy with iam:CreateAccessKey for lateral
    movement to another user
  description: This is a variation of `iam:AttachUserPolicy` (iam-008). This variation is needed when
    you have `iam:AttachUserPolicy` permission on another user (not your own principal). In this scenario,
    you cannot directly escalate your own privileges, but you can escalate by modifying a different user
    and then authenticating as that user. Since the target is a user (not a role), you need `iam:CreateAccessKey`
    to create credentials for authentication, rather than using `sts:AssumeRole`. You attach an administrative
    policy (such as AdministratorAccess) to the target user, create new access keys for that user, and
    then authenticate using those credentials to gain the elevated privileges. The target user may initially
    have minimal or no permissions, but you control which policy is attached, making administrative access
    a deterministic outcome.
  recommendation: "Restrict `iam:AttachUserPolicy` and `iam:CreateAccessKey` using the principle of least\
    \ privilege. These permissions should rarely be granted together on the same target user, as this\
    \ combination creates a direct privilege escalation path.\n\n**Prevention strategies:**\n\n1. Use\
    \ IAM policy conditions to restrict which policies can be attached:\n```json\n{\n  \"Effect\": \"\
    Allow\",\n  \"Action\": \"iam:AttachUserPolicy\",\n  \"Resource\": \"arn:aws:iam::ACCOUNT:user/SpecificUser\"\
    ,\n  \"Condition\": {\n    \"ArnNotEquals\": {\n      \"iam:PolicyARN\": [\n        \"arn:aws:iam::aws:policy/AdministratorAccess\"\
    ,\n        \"arn:aws:iam::aws:policy/IAMFullAccess\"\n      ]\n    }\n  }\n}\n```\n\n2. Restrict `iam:CreateAccessKey`\
    \ to prevent cross-user access key creation:\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\":\
    \ \"iam:CreateAccessKey\",\n  \"Resource\": \"arn:aws:iam::ACCOUNT:user/${aws:username}\",\n  \"Condition\"\
    : {\n    \"StringEquals\": {\n      \"iam:UserName\": \"${aws:username}\"\n    }\n  }\n}\n```\n\n\
    3. Implement Service Control Policies (SCPs) to prevent attachment of highly privileged managed policies\n\
    \n4. Use IAM permissions boundaries to limit the maximum permissions a user can have, even if admin\
    \ policies are attached\n\n5. Separate the permissions - avoid granting both `iam:AttachUserPolicy`\
    \ and `iam:CreateAccessKey` to the same principal for other users\n\n6. Require MFA for sensitive\
    \ policy attachment operations and access key creation\n\n**Detection strategies:**\n\nMonitor CloudTrail\
    \ for the following event patterns:\n- `AttachUserPolicy` API calls where the calling principal differs\
    \ from the target user, especially when administrative policies are attached\n- `CreateAccessKey`\
    \ API calls where the calling principal differs from the target user\n- Sequential occurrences of\
    \ `AttachUserPolicy` followed by `CreateAccessKey` on the same user within a short time window\n-\
    \ Attachment of AWS-managed policies like `AdministratorAccess` or `IAMFullAccess` to users\n- Access\
    \ key creation events that follow policy modification events\n\nSet up CloudWatch alarms for unexpected\
    \ changes to user policies and creation of access keys by non-self principals. Investigate any modifications\
    \ to user permissions combined with access key creation."
  limitations: The attack provides administrative access only if an admin policy (like AdministratorAccess)
    is attached to the user. However, the attacker could attach any AWS-managed or customer-managed policy
    they have visibility into, so the level of access depends on available policies.
  references:
  - title: AWS IAM Privilege Escalation – Methods and Mitigation
    url: https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
