- id: codebuild-001
  name: iam:PassRole + codebuild:CreateProject + codebuild:StartBuild
  category: new-passrole
  services:
  - iam
  - codebuild
  required_actions:
  - iam:passrole
  - codebuild:createproject
  - codebuild:startbuild
  additional_actions:
  - iam:listroles
  - iam:getrole
  - codebuild:batchgetbuilds
  parent: null
  parent_modification: null
  description: A principal with `iam:PassRole`, `codebuild:CreateProject`, and `codebuild:StartBuild`
    can create a new CodeBuild project and attach an existing privileged IAM role to it. By starting a
    build with a malicious buildspec, the attacker can execute arbitrary code with the permissions of
    the attached role, allowing privilege escalation. This is a classic "pass role to service" privilege
    escalation pattern where the combination of service creation, role passing, and execution permissions
    creates an indirect path to elevated privileges. The level of access gained depends on the permissions
    of the available roles.
  recommendation: "High powered service roles + overly permissive `iam:PassRole` is what makes this privilege\
    \ escalation path exploitable and impactful.\n\n- **Avoid administrative service roles** - Very rarely\
    \ does a CodeBuild project need administrative access. Use the principle of least privilege.\n- **Avoid\
    \ granting `iam:PassRole` on all resources** - Whenever possible, restrict `iam:PassRole` to specific\
    \ roles or specific services.\n\nUse IAM policy conditions to restrict which roles can be passed and\
    \ to which services:\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:PassRole\",\n  \"\
    Resource\": \"arn:aws:iam::ACCOUNT_ID:role/SpecificCodeBuildRole\",\n  \"Condition\": {\n    \"StringEquals\"\
    : {\n      \"iam:PassedToService\": \"codebuild.amazonaws.com\"\n    }\n  }\n}\n```\n\n- Monitor CloudTrail\
    \ for unusual CodeBuild project creation followed by immediate build execution\n- Monitor CloudTrail\
    \ for CodeBuild project creation by principals who do not usually create projects\n- Monitor CloudTrail\
    \ for roles being passed to CodeBuild that haven't been used before\n- Monitor and alert on CodeBuild\
    \ project creation with privileged roles\n- Regularly audit CodeBuild projects for excessive IAM permissions\n\
    - Regularly audit all IAM roles that trust the CodeBuild service and down-scope any roles with administrative\
    \ access"
  limitations: This path provides administrative access only if the passed role has administrative permissions
    (e.g., AdministratorAccess or an equivalent custom policy). If only limited roles are available, you
    gain access limited to those permissions. However, even limited access may enable multi-hop attacks.
  references:
  - title: IAM Vulnerable - CodeBuild PassRole
