- id: codebuild-002
  name: codebuild:StartBuild
  category: existing-passrole
  services:
  - codebuild
  - iam
  required_actions:
  - codebuild:startbuild
  additional_actions:
  - codebuild:listprojects
  - codebuild:batchgetprojects
  - codebuild:batchgetbuilds
  parent: null
  parent_modification: null
  description: A principal with `codebuild:StartBuild` can exploit an existing CodeBuild project that
    has a privileged service role by using the `--buildspec-override` parameter to execute arbitrary commands
    with elevated permissions. Unlike the PassRole+CreateProject attack, this path does NOT require `iam:PassRole`
    or `codebuild:CreateProject` permissions. The attacker can replace the project's buildspec with malicious
    commands that execute with the project's service role permissions, potentially achieving administrative
    access if the role is sufficiently privileged.
  recommendation: "Restrict `codebuild:StartBuild` permission using resource-based constraints:\n\n```json\n\
    {\n  \"Effect\": \"Allow\",\n  \"Action\": \"codebuild:StartBuild\",\n  \"Resource\": \"arn:aws:codebuild:*:ACCOUNT_ID:project/specific-safe-project\"\
    \n}\n```\n\nAdditional security controls:\n- **Least Privilege Service Roles**: Ensure CodeBuild service\
    \ roles follow least privilege principles and cannot modify IAM permissions\n- **Disable Buildspec\
    \ Override**: For projects with privileged roles, disable buildspec overrides in the project configuration\n\
    - **CloudTrail Monitoring**: Alert on `StartBuild` API calls with buildspec overrides, especially\
    \ on projects with privileged roles\n- **Monitor IAM Changes**: Alert on `AttachUserPolicy`, `PutUserPolicy`,\
    \ `AttachRolePolicy`, and `PutRolePolicy` calls originating from CodeBuild service principals\n- **Service\
    \ Control Policies**: Implement SCPs to prevent CodeBuild service roles from modifying IAM policies\n\
    - **IAM Access Analyzer**: Use AWS IAM Access Analyzer to identify privilege escalation paths involving\
    \ CodeBuild projects\n- **Regular Audits**: Review CodeBuild projects to identify those with privileged\
    \ service roles and restrict access accordingly\n- **Separation of Concerns**: Avoid attaching administrative\
    \ roles to CodeBuild projects; use least-privilege roles specific to build requirements"
  limitations: This path provides administrative access only if the existing CodeBuild project's service
    role has administrative permissions (e.g., AdministratorAccess or an equivalent custom policy). If
    the project only has limited permissions, you gain access limited to those permissions. However, even
    limited access may enable multi-hop privilege escalation attacks.
  references:
  - title: HackTricks - AWS - Codebuild Privesc
    url: https://cloud.hacktricks.wiki/en/pentesting-cloud/aws-security/aws-privilege-escalation/aws-codebuild-privesc/index.html#codebuildstartbuild--codebuildstartbuildbatch
