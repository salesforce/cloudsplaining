- id: iam-017
  name: iam:PutRolePolicy + sts:AssumeRole
  category: principal-access
  services:
  - iam
  - sts
  required_actions:
  - iam:putrolepolicy
  - sts:assumerole
  additional_actions:
  - iam:listroles
  - iam:getrole
  - iam:listrolepolicies
  - iam:getrolepolicy
  parent: iam-005
  parent_modification: This variation combines iam:PutRolePolicy with sts:AssumeRole for lateral movement
    to another role (requires trust policy configuration)
  description: This is a variation of `iam:PutRolePolicy` (iam-005). This variation is needed when you
    have `iam:PutRolePolicy` permission on another role (not your own principal). In this scenario, you
    cannot directly escalate your own privileges, but you can escalate by modifying a different role and
    then assuming it. This requires both `iam:PutRolePolicy` on the target role AND `sts:AssumeRole` permission.
    Critically, the target role must also be configured with a trust policy that explicitly allows your
    principal to assume it. You add an inline policy with administrative permissions directly to the target
    role, then assume that role to gain the elevated privileges. Inline policies are embedded directly
    in IAM roles and are often overlooked during security reviews because they are not visible as standalone
    policy objects, making this privilege escalation technique less visible than managed policy attachments.
  recommendation: "To prevent this privilege escalation path:\n\n**1. Restrict inline policy management\
    \ permissions:**\nLimit `iam:PutRolePolicy`, `iam:PutUserPolicy`, and `iam:PutGroupPolicy` to only\
    \ trusted administrators. These permissions allow direct modification of principal permissions without\
    \ the visibility of managed policies.\n\n**2. Implement least privilege for role assumption:**\nOnly\
    \ grant `sts:AssumeRole` permission to principals that have a legitimate business need to assume specific\
    \ roles. Use resource-level restrictions to limit which roles can be assumed:\n```json\n{\n  \"Effect\"\
    : \"Allow\",\n  \"Action\": \"sts:AssumeRole\",\n  \"Resource\": \"arn:aws:iam::ACCOUNT_ID:role/SpecificAllowedRole\"\
    \n}\n```\n\n**3. Use SCPs to prevent inline policy creation:**\nDeploy Service Control Policies (SCPs)\
    \ that deny `iam:Put*Policy` actions for sensitive roles, even if IAM permissions allow it:\n```json\n\
    {\n  \"Version\": \"2012-10-17\",\n  \"Statement\": [\n    {\n      \"Effect\": \"Deny\",\n      \"\
    Action\": [\n        \"iam:PutRolePolicy\",\n        \"iam:PutUserPolicy\",\n        \"iam:PutGroupPolicy\"\
    \n      ],\n      \"Resource\": [\n        \"arn:aws:iam::*:role/SensitiveRole*\",\n        \"arn:aws:iam::*:user/PrivilegedUser*\"\
    \n      ]\n    }\n  ]\n}\n```\n\n**4. Monitor inline policy changes:**\nConfigure AWS CloudTrail alerts\
    \ for `PutRolePolicy`, `PutUserPolicy`, and `PutGroupPolicy` API calls. These are high-risk actions\
    \ that should be rare and closely monitored.\n\n**5. Prefer managed policies over inline policies:**\n\
    Managed policies are more visible in security reviews and easier to audit. Consider blocking inline\
    \ policy creation entirely for production environments.\n\n**6. Implement permission boundaries:**\n\
    Use IAM permission boundaries on roles to set the maximum permissions that can be granted, even through\
    \ inline policies.\n\n**7. Regular audits:**\nPeriodically audit all roles for inline policies, especially\
    \ those with sensitive trust policies. Inline policies are less visible than managed policies and\
    \ may be overlooked."
  limitations: This path provides administrative access only if the inline policy includes administrative
    permissions. The attacker gains whatever permissions are specified in the inline policy they create.
    However, even limited additional permissions may enable multi-hop attacks.
  references:
  - title: AWS IAM Privilege Escalation Methods and Mitigation
    url: https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
  - title: 'AWS-IAM-Privilege-Escalation - Method 12: Creating/updating an inline policy for a role'
