  description: A principal with `lambda:UpdateFunctionCode` and `lambda:InvokeFunction` can modify the
    code of an existing Lambda function that has a privileged execution role and then manually invoke
    it. By replacing the function code with malicious code and invoking it, the attacker can execute arbitrary
    commands with the privileges of the function's execution role immediately, without waiting for automatic
    triggers.
