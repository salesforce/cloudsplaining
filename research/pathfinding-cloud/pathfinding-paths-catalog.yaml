  - iam:getrole
  - iam:listattachedrolepolicies
  parent: lambda-003
  parent_modification: Adds lambda:AddPermission to grant self-invocation permission when the starting
    principal does not already have `lambda:InvokeFunction`
  description: A principal with `lambda:UpdateFunctionCode` and `lambda:AddPermission` can modify an existing
    Lambda function's code with malicious code and grant themselves permission to invoke it via the resource-based
    policy. The attacker does not need `lambda:InvokeFunction` as an IAM permission because `lambda:AddPermission`
    grants invocation rights through the function's resource-based policy. This allows the attacker to
    execute the malicious code under the function's privileged execution role immediately, without waiting
    for automatic triggers.
  recommendation: "Restrict `lambda:UpdateFunctionCode`, `lambda:AddPermission`, and `lambda:InvokeFunction`\
    \ permissions using the principle of least privilege. These permissions should be limited to specific\
    \ Lambda function resources:\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": [\n    \"lambda:UpdateFunctionCode\"\
    ,\n    \"lambda:AddPermission\",\n    \"lambda:InvokeFunction\"\n  ],\n  \"Resource\": \"arn:aws:lambda:REGION:ACCOUNT_ID:function/SpecificFunction\"\
    \n}\n```\n\nAdditional security controls:\n- Implement Lambda code signing to prevent unauthorized\
    \ code modifications\n- Lambda execution roles should follow least privilege and never have AdministratorAccess\n\
    - Use AWS Config rules to detect Lambda functions with overly permissive execution roles\n- Monitor\
    \ CloudTrail for `UpdateFunctionCode`, `AddPermission`, and `InvokeFunction` events on sensitive functions\n\
    - Implement SCPs to prevent modification of Lambda functions with privileged roles\n- Use IAM Access\
    \ Analyzer to identify privilege escalation paths involving Lambda permissions\n- Protect resource-based\
    \ policies by denying `lambda:AddPermission` except for trusted CI/CD roles\n- Enable CloudWatch alarms\
    \ for unusual Lambda invocation patterns on privileged functions"
  limitations: This path provides administrative access only if the target Lambda function's execution
    role has administrative permissions (e.g., AdministratorAccess or equivalent custom policies). If
    the execution role has limited permissions, you gain access limited to those permissions. However,
    even limited execution role access may enable multi-hop attacks or access to sensitive data stores.
  references:
