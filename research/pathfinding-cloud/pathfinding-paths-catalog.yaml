- id: lambda-003
  name: lambda:UpdateFunctionCode
  category: existing-passrole
  services:
  - lambda
  required_actions:
  - lambda:updatefunctioncode
  additional_actions:
  - lambda:listfunctions
  - lambda:getfunction
  - lambda:getfunctionconfiguration
  - iam:getrole
  - iam:listattachedrolepolicies
  parent: null
  parent_modification: null
  description: A principal with `lambda:UpdateFunctionCode` can modify the code of an existing Lambda
    function that has a privileged execution role. By replacing the function code with malicious code,
    the attacker can execute arbitrary commands with the privileges of the function's execution role when
    the function is invoked. This is particularly effective against functions that are automatically triggered
    by events or regularly invoked.
  recommendation: "Restrict the `lambda:UpdateFunctionCode` permission using the principle of least privilege.\n\
    Use resource-based policies to limit which functions can be modified:\n\n```json\n{\n  \"Effect\"\
    : \"Allow\",\n  \"Action\": \"lambda:UpdateFunctionCode\",\n  \"Resource\": \"arn:aws:lambda:REGION:ACCOUNT_ID:function/SpecificFunction\"\
    \n}\n```\n\nAdditional controls:\n- Monitor CloudTrail for `UpdateFunctionCode` events on sensitive\
    \ functions\n- Implement Lambda function versioning and aliases to prevent direct modification\n-\
    \ Use AWS Config rules to detect changes to Lambda function code\n- Require code signing for Lambda\
    \ deployments\n- Alert on Lambda functions with privileged roles being modified"
  limitations: This path provides administrative access only if the target resource's execution role has
    administrative permissions. The attacker gains whatever permissions the resource's role has. If the
    role has limited permissions, the attacker gains limited access. However, even limited access may
