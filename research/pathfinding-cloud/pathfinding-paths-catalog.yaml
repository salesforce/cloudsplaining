    \ `iam:PutUserPolicy` to prevent cross-user inline policy modification:\n```json\n{\n  \"Effect\"\
    : \"Allow\",\n  \"Action\": \"iam:PutUserPolicy\",\n  \"Resource\": \"arn:aws:iam::ACCOUNT:user/${aws:username}\"\
    ,\n  \"Condition\": {\n    \"StringEquals\": {\n      \"iam:UserName\": \"${aws:username}\"\n    }\n\
    \  }\n}\n```\n\n2. Restrict `iam:CreateAccessKey` to prevent cross-user access key creation:\n```json\n\
    {\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:CreateAccessKey\",\n  \"Resource\": \"arn:aws:iam::ACCOUNT:user/${aws:username}\"\
    ,\n  \"Condition\": {\n    \"StringEquals\": {\n      \"iam:UserName\": \"${aws:username}\"\n    }\n\
    \  }\n}\n```\n\n3. Use IAM permissions boundaries to limit the maximum permissions a user can have,\
    \ even if administrative inline policies are added\n\n4. Separate the permissions - avoid granting\
    \ both `iam:PutUserPolicy` and `iam:CreateAccessKey` to the same principal for other users\n\n5. Require\
    \ MFA for sensitive inline policy operations and access key creation\n\n6. Implement regular audits\
    \ of inline policies, as they can be less visible than managed policies in standard IAM reviews\n\n\
    7. Use Service Control Policies (SCPs) to prevent the addition of overly permissive inline policies\n\
    \n**Detection strategies:**\n\nMonitor CloudTrail for the following event patterns:\n- `PutUserPolicy`\
    \ API calls where the calling principal differs from the target user\n- `CreateAccessKey` API calls\
    \ where the calling principal differs from the target user\n- Sequential occurrences of `PutUserPolicy`\
    \ followed by `CreateAccessKey` on the same user within a short time window\n- `PutUserPolicy` events\
    \ with policy documents containing broad permissions (e.g., `\"Action\": \"*\"` or `\"Action\": \"\
    iam:*\"`)\n- Access key creation events that follow inline policy modification events\n\nSet up CloudWatch\
    \ alarms for unexpected changes to inline user policies and creation of access keys by non-self principals.\
    \ Investigate any modifications to user inline policies combined with access key creation. Consider\
    \ implementing automated responses to roll back suspicious inline policy changes."
  limitations: The attack provides administrative access because the attacker controls the inline policy
    document content. Unlike iam:AttachUserPolicy (which requires choosing from existing managed policies),
    iam:PutUserPolicy allows the attacker to embed any policy document directly into the user, guaranteeing
    administrative permissions regardless of what policies exist in the environment.
  references:
  - title: AWS IAM Privilege Escalation – Methods and Mitigation
    url: https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
