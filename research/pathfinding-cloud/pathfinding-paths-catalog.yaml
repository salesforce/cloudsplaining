  required_actions:
  - sagemaker:createnotebookinstancelifecycleconfig
  - sagemaker:stopnotebookinstance
  - sagemaker:updatenotebookinstance
  - sagemaker:startnotebookinstance
  additional_actions:
  - sagemaker:describenotebookinstance
  - sagemaker:listnotebookinstances
  - iam:getrole
  parent: null
  parent_modification: null
  description: A principal with SageMaker notebook management permissions can inject malicious code into
    an existing notebook instance by creating a malicious lifecycle configuration and attaching it to
    the notebook. Lifecycle configurations are shell scripts that execute automatically when a notebook
    starts, and critically, these scripts run with the notebook's execution role credentials rather than
    the attacker's credentials. By stopping the notebook, attaching a malicious lifecycle config, and
    restarting it, the attacker can execute arbitrary code with the notebook's execution role permissions.
    If the notebook has an execution role with administrative access (a common practice for data science
    workflows), the attacker gains full administrative access to the AWS account.
  recommendation: "High powered notebook execution roles + overly permissive SageMaker management permissions\
    \ is what makes this privilege escalation path exploitable and impactful.\n\n- **Avoid administrative\
    \ notebook execution roles** - Very rarely does a SageMaker notebook need administrative access. Use\
    \ the principle of least privilege and scope execution roles to only the specific S3 buckets, data\
    \ sources, and AWS services required for data science workloads.\n- **Restrict SageMaker management\
    \ permissions** - Limit `sagemaker:UpdateNotebookInstance` and `sagemaker:CreateNotebookInstanceLifecycleConfig`\
    \ permissions to infrastructure administrators only, not data science users. Separate notebook usage\
    \ permissions from notebook configuration permissions.\n- **Implement resource-based conditions**\
    \ - Use IAM condition keys to restrict lifecycle configuration changes:\n\n```json\n{\n  \"Effect\"\
    : \"Allow\",\n  \"Action\": \"sagemaker:UpdateNotebookInstance\",\n  \"Resource\": \"*\",\n  \"Condition\"\
    : {\n    \"StringLike\": {\n      \"sagemaker:LifecycleConfigName\": [\"approved-config-*\"]\n   \
    \ }\n  }\n}\n```\n\n- **Require approval workflows** - Implement approval workflows for notebook configuration\
    \ changes using AWS Service Catalog or custom automation\n- Monitor CloudTrail for unusual notebook\
    \ lifecycle configuration creation followed by immediate notebook updates\n- Monitor CloudTrail for\
    \ notebook configuration changes by principals who do not usually manage infrastructure\n- Monitor\
    \ CloudTrail for the specific API call sequence: `StopNotebookInstance` → `CreateNotebookInstanceLifecycleConfig`\
    \ → `UpdateNotebookInstance` → `StartNotebookInstance` as this pattern indicates potential exploitation\n\
    - Monitor and alert on lifecycle configuration changes to notebook instances with privileged execution\
    \ roles\n- Regularly audit SageMaker notebook instances for excessive execution role permissions\n\
    - Regularly audit all IAM roles that trust the SageMaker service and down-scope any roles with administrative\
    \ access\n- Use Service Control Policies (SCPs) to prevent creation of SageMaker execution roles with\
    \ administrative permissions"
  limitations: This path provides administrative access only if the target notebook's execution role has
    administrative permissions (e.g., AdministratorAccess policy). If only limited roles are available,
    you gain access limited to those permissions. However, even limited access may enable multi-hop attacks
    or access to sensitive data.
