- id: cloudformation-002
  name: cloudformation:UpdateStack
  category: existing-passrole
  services:
  - cloudformation
  - iam
  required_actions:
  - cloudformation:updatestack
  additional_actions:
  - cloudformation:describestacks
  - cloudformation:gettemplate
  - iam:getrole
  - sts:assumerole
  parent: null
  parent_modification: null
  description: A principal with `cloudformation:UpdateStack` can modify an existing CloudFormation stack
    that has an administrative service role attached. CloudFormation stacks execute with the permissions
    of their service role, which often requires elevated privileges to manage infrastructure. By updating
    the stack template to include new IAM resources (such as an admin role with a trust policy allowing
    the attacker to assume it), the attacker can leverage the stack's elevated permissions to create resources
    they couldn't create directly. This is particularly insidious because it appears as legitimate infrastructure
    management activity.
  recommendation: "Restrict the `cloudformation:UpdateStack` permission using the principle of least privilege.\n\
    \nUse IAM policy conditions to restrict which stacks can be updated:\n\n```json\n{\n  \"Effect\":\
    \ \"Allow\",\n  \"Action\": \"cloudformation:UpdateStack\",\n  \"Resource\": \"arn:aws:cloudformation:*:*:stack/approved-stack-name/*\"\
    ,\n  \"Condition\": {\n    \"StringEquals\": {\n      \"cloudformation:StackId\": \"arn:aws:cloudformation:*:*:stack/approved-stack/*\"\
    \n    }\n  }\n}\n```\n\nAdditional controls:\n- Implement least privilege principles for CloudFormation\
    \ service roles - avoid granting AdministratorAccess when more granular permissions suffice\n- Use\
    \ CloudFormation stack policies to prevent modifications to sensitive resources:\n  ```json\n  {\n\
    \    \"Statement\": [\n      {\n        \"Effect\": \"Deny\",\n        \"Principal\": \"*\",\n   \
    \     \"Action\": \"Update:*\",\n        \"Resource\": \"LogicalResourceId/SensitiveRole\"\n     \
    \ }\n    ]\n  }\n  ```\n- Implement Service Control Policies (SCPs) to restrict CloudFormation stack\
    \ updates that create or modify IAM resources\n- Monitor CloudTrail for `UpdateStack` API calls, especially\
    \ those that modify stacks with elevated service roles\n- Enable CloudFormation drift detection and\
    \ alerts to identify unauthorized stack modifications\n- Require MFA for CloudFormation updates using\
    \ condition keys like `aws:MultiFactorAuthPresent`\n- Use IAM Access Analyzer to identify and remediate\
    \ privilege escalation paths involving CloudFormation permissions\n- Implement change approval workflows\
    \ for CloudFormation stack updates that modify IAM resources\n- Regularly audit CloudFormation service\
    \ roles and reduce permissions to the minimum required for stack operations"
  limitations: This path provides administrative access only if the existing stack's service role has
    administrative permissions. If the service role has limited permissions, the attacker gains access
    limited to those permissions. However, even limited access may enable multi-hop attacks.
  references:
  - title: PMapper CloudFormation Edge Detection (Original Implementation)
    url: https://github.com/nccgroup/PMapper/blob/master/principalmapper/graphing/cloudformation_edges.py
  - title: AWS IAM Privilege Escalation - Methods and Mitigation (Rhino Security Labs)
    url: https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
  - title: Escalating AWS IAM Privileges with an Undocumented CodeStar API
    url: https://rhinosecuritylabs.com/aws/escalating-aws-iam-privileges-undocumented-codestar-api/
  - title: CloudFormation Change Set Privilege Escalation
    url: https://dev.to/aws-builders/cloudformation-change-set-privilege-escalation-18i6
  - title: AWS IAM Privilege Escalation Techniques (HackingThe.Cloud)
    url: https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
  - title: AWS CloudFormation Service Role Documentation
    url: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/using-iam-servicerole.html
  - title: CloudFormation Stack Policies
    url: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/protect-stack-resources.html
  - title: Service Roles for CloudFormation (AWS Prescriptive Guidance)
    url: https://docs.aws.amazon.com/prescriptive-guidance/latest/least-privilege-cloudformation/service-roles-for-cloudformation.html
