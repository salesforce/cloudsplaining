  additional_actions:
  - iam:listusers
  - iam:getuser
  parent: null
  parent_modification: null
  description: Anyone with access to `iam:CreateAccessKey` can create access keys for any user they have
    this permission on. This permission is often abused by one principal to gain access to another principal
    and the permissions associated with that principal.
  recommendation: Restrict access to `iam:CreateAccessKey` using the principle of least privilege. Only
    allow users to create access keys for themselves or users they are authorized to manage. Very few
    principals need this permission on anyone other than themselves, so it should be restricted to only
    the few principals that need it.
  limitations: This path provides administrative access only if the target user or group has administrative
    permissions. The attacker gains whatever permissions the target principal has. If the target has limited
    permissions, the attacker gains limited access. However, even limited access may enable multi-hop
    attacks or access to sensitive data.
