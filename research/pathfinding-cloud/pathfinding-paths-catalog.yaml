- id: iam-021
  name: iam:PutRolePolicy + iam:UpdateAssumeRolePolicy
  category: principal-access
  services:
  - iam
  required_actions:
  - iam:putrolepolicy
  - iam:updateassumerolepolicy
  additional_actions:
  - iam:listroles
  - iam:getrole
  - iam:listrolepolicies
  - iam:getrolepolicy
  parent: iam-005
  parent_modification: This variation combines iam:PutRolePolicy with iam:UpdateAssumeRolePolicy to both
    add an inline policy to a role and modify its trust policy, eliminating the need for pre-existing
    trust policy configuration or sts:AssumeRole permission
  description: 'A principal with `iam:PutRolePolicy` and `iam:UpdateAssumeRolePolicy` can achieve privilege
    escalation by first adding an inline policy with administrative permissions to a target role, then
    modifying that role''s trust policy to allow the attacker to assume it. The key insight is that when
    a principal is explicitly named in a role''s trust policy, that principal can assume the role without
    needing separate `sts:AssumeRole` permissions - the trust policy itself grants this capability. This
    attack is often overlooked because each permission appears innocuous when evaluated separately: `iam:PutRolePolicy`
    seems like a reasonable permission for managing role permissions, and `iam:UpdateAssumeRolePolicy`
    seems reasonable for managing trust relationships. However, when combined, they create a complete
    privilege escalation path.'
  recommendation: "Restrict `iam:PutRolePolicy` and `iam:UpdateAssumeRolePolicy` using the principle of\
    \ least privilege. These permissions should rarely be granted together on the same target role, as\
    \ this combination creates a direct privilege escalation path.\n\n**Prevention strategies:**\n\n1.\
    \ Restrict `iam:PutRolePolicy` to prevent inline policy modification on sensitive roles:\n```json\n\
    {\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:PutRolePolicy\",\n  \"Resource\": \"arn:aws:iam::ACCOUNT:role/non-sensitive-prefix-*\"\
    ,\n  \"Condition\": {\n    \"StringNotLike\": {\n      \"iam:RoleName\": [\"admin-*\", \"privileged-*\"\
    ]\n    }\n  }\n}\n```\n\n2. Restrict `iam:UpdateAssumeRolePolicy` to prevent trust policy modification\
    \ on sensitive roles:\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:UpdateAssumeRolePolicy\"\
    ,\n  \"Resource\": \"arn:aws:iam::ACCOUNT:role/non-sensitive-prefix-*\",\n  \"Condition\": {\n   \
    \ \"StringNotLike\": {\n      \"iam:RoleName\": [\"admin-*\", \"privileged-*\"]\n    }\n  }\n}\n```\n\
    \n3. Use IAM permissions boundaries to limit the maximum permissions a role can have, even if administrative\
    \ inline policies are added\n\n4. Separate the permissions - avoid granting both `iam:PutRolePolicy`\
    \ and `iam:UpdateAssumeRolePolicy` to the same principal for the same target roles\n\n5. Require MFA\
    \ for sensitive trust policy modifications and inline policy operations\n\n6. Implement regular audits\
    \ of role trust policies and inline policies, as both can be less visible than managed policies in\
    \ standard IAM reviews\n\n7. Use Service Control Policies (SCPs) to prevent the addition of overly\
    \ permissive inline policies or trust policy modifications on critical roles\n\n8. Implement deny\
    \ policies that explicitly block modification of trust policies or inline policies on administrative\
    \ or critical roles\n\n**Detection strategies:**\n\nMonitor CloudTrail for the following event patterns:\n\
    - `PutRolePolicy` API calls with policy documents containing broad permissions (e.g., `\"Action\"\
    : \"*\"` or `\"Action\": \"iam:*\"`)\n- `UpdateAssumeRolePolicy` API calls that add new principals\
    \ to trust policies\n- Sequential occurrences of `PutRolePolicy` followed by `UpdateAssumeRolePolicy`\
    \ on the same role within a short time window\n- `AssumeRole` API calls immediately following `UpdateAssumeRolePolicy`\
    \ events\n- Trust policy modifications that add specific principal ARNs (as opposed to service principals\
    \ like `ec2.amazonaws.com`)\n\nSet up CloudWatch alarms for unexpected changes to role trust policies\
    \ and inline role policies. Investigate any trust policy modifications combined with inline policy\
    \ additions. Consider implementing automated responses to roll back suspicious changes to critical\
    \ role trust policies or inline policies."
  limitations: This attack provides administrative access because the attacker controls the inline policy
    document content. Unlike `iam:AttachRolePolicy` (which requires choosing from existing managed policies),
    `iam:PutRolePolicy` allows the attacker to embed any policy document directly into the role, guaranteeing
    administrative permissions regardless of what policies exist in the environment.
  references:
  - title: HackTricks - AWS - IAM Privesc
    url: https://cloud.hacktricks.wiki/en/pentesting-cloud/aws-security/aws-privilege-escalation/aws-iam-privesc/index.html#iamupdateassumerolepolicy
