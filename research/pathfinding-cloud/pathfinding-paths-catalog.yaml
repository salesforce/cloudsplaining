    exact_match_methods: []
    subset_existing_methods: []
    credential_action_hits: []
- id: iam-020
  name: iam:CreatePolicyVersion + iam:UpdateAssumeRolePolicy
  category: principal-access
  services:
  - iam
  required_actions:
  - iam:createpolicyversion
  - iam:updateassumerolepolicy
  additional_actions:
  - iam:getpolicy
  - iam:getpolicyversion
  - iam:listpolicyversions
  - iam:listroles
  - iam:getrole
  parent: iam-001
  parent_modification: This variation combines iam:CreatePolicyVersion with iam:UpdateAssumeRolePolicy
    to both elevate a policy's permissions and modify the role's trust policy, eliminating the need for
    pre-existing trust policy configuration or sts:AssumeRole permission
  description: This is a variation of `iam:CreatePolicyVersion` (iam-001). This variation is needed when
    you have `iam:CreatePolicyVersion` permission on a customer-managed policy that is attached to a different
    role (not your own principal). In this scenario, you cannot directly escalate your own privileges
    by modifying the policy, but you can escalate by modifying the policy attached to the target role
    and then assuming that role. This requires both `iam:CreatePolicyVersion` on the customer-managed
    policy AND `iam:UpdateAssumeRolePolicy` on the target role. You create a new policy version with administrative
    permissions (which automatically becomes the default), update the target role's trust policy to allow
    your principal to assume it, then assume the role to gain the elevated privileges. Critically, you
    do not need `sts:AssumeRole` permission beforehand - when a principal is explicitly named in a role's
    trust policy, AWS allows that principal to assume the role regardless of whether they have separate
    `sts:AssumeRole` permission.
  recommendation: "Restrict `iam:CreatePolicyVersion` and `iam:UpdateAssumeRolePolicy` using the principle\
    \ of least privilege. These permissions are highly sensitive and should rarely be granted together.\n\
    \n**Prevention strategies:**\n\n1. Limit `iam:CreatePolicyVersion` to only administrative users who\
    \ need to manage policies:\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:CreatePolicyVersion\"\
    ,\n  \"Resource\": \"arn:aws:iam::ACCOUNT:policy/SpecificPolicy\",\n  \"Condition\": {\n    \"StringEquals\"\
    : {\n      \"aws:RequestedRegion\": \"us-east-1\"\n    }\n  }\n}\n```\n\n2. Restrict `iam:UpdateAssumeRolePolicy`\
    \ to prevent unauthorized trust policy modifications:\n```json\n{\n  \"Effect\": \"Allow\",\n  \"\
    Action\": \"iam:UpdateAssumeRolePolicy\",\n  \"Resource\": \"arn:aws:iam::ACCOUNT:role/SpecificRole\"\
    ,\n  \"Condition\": {\n    \"StringNotLike\": {\n      \"iam:PolicyDocument\": \"*arn:aws:iam::*:role/*\"\
    \n    }\n  }\n}\n```\n\n3. Use Service Control Policies (SCPs) to prevent modification of critical\
    \ policies and trust relationships across the organization\n\n4. Implement IAM permissions boundaries\
    \ to limit the maximum permissions a role can have\n\n5. Separate the permissions - avoid granting\
    \ both `iam:CreatePolicyVersion` and `iam:UpdateAssumeRolePolicy` to the same principal\n\n6. Require\
    \ MFA for policy version creation and trust policy modification operations\n\n7. Consider using AWS\
    \ IAM Access Analyzer to continuously monitor trust policies for unexpected principals\n\n**Detection\
    \ strategies:**\n\nMonitor CloudTrail for the following event patterns:\n- `CreatePolicyVersion` API\
    \ calls, especially with the `--set-as-default` flag\n- `UpdateAssumeRolePolicy` API calls that add\
    \ new principals to trust policies\n- Sequential occurrences of `CreatePolicyVersion` followed by\
    \ `UpdateAssumeRolePolicy` within a short time window\n- `AssumeRole` events that follow policy or\
    \ trust policy modification events\n- Creation of policy versions that grant overly broad permissions\
    \ (e.g., `Action: \"*\"` or administrative managed policies)\n\nSet up CloudWatch alarms for unexpected\
    \ changes to customer-managed policies and role trust policies. Investigate any modifications that\
    \ broaden trust relationships or elevate permissions."
  limitations: The attack provides administrative access when you create a policy version with admin permissions.
    However, you could create a policy with any permissions, so the level of access depends on what you
    include in the new policy version.
  references:
  - title: AWS IAM Privilege Escalation Methods
    url: https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
  - title: Hacking The Cloud - IAM Privilege Escalation
    url: https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
  - title: HackTricks - AWS - IAM Privesc
    url: https://cloud.hacktricks.wiki/en/pentesting-cloud/aws-security/aws-privilege-escalation/aws-iam-privesc/index.html#iamcreatepolicyversion
  relatedPaths:
  - iam-001
  - iam-002
  - iam-009
  - iam-014
  cloudsplaining_coverage:
    status: detectable-via-existing
    exact_match_methods: []
    subset_existing_methods:
