  parent: null
  parent_modification: null
  description: A principal with `codebuild:StartBuildBatch` can exploit an existing CodeBuild project
    that has a privileged service role by using the `--buildspec-override` parameter to execute arbitrary
    commands with elevated permissions. Similar to `codebuild:StartBuild`, this permission allows injecting
    malicious buildspecs without requiring `iam:PassRole` or `codebuild:CreateProject` permissions. The
    attacker can leverage batch build capabilities to execute commands with the project's service role
    permissions, potentially achieving administrative access if the role is sufficiently privileged.
  recommendation: "Restrict `codebuild:StartBuildBatch` permission using resource-based constraints:\n\
    \n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"codebuild:StartBuildBatch\",\n  \"Resource\"\
    : \"arn:aws:codebuild:*:ACCOUNT_ID:project/specific-safe-project\"\n}\n```\n\nAdditional security\
    \ controls:\n- **Least Privilege Service Roles**: Ensure CodeBuild service roles follow least privilege\
    \ principles and cannot modify IAM permissions\n- **Disable Buildspec Override**: For projects with\
    \ privileged roles, disable buildspec overrides in the project configuration by setting `overrideConfigurationOverride`\
    \ to prevent buildspec modifications\n- **Require Source Control Buildspecs**: Configure CodeBuild\
    \ projects to require buildspecs from source control (GitHub, CodeCommit) rather than allowing inline\
    \ overrides\n- **CloudTrail Monitoring**: Alert on `StartBuildBatch` API calls with `buildspec-override`\
    \ parameter, especially on projects with privileged roles\n- **Monitor IAM Changes**: Alert on `AttachUserPolicy`,\
    \ `PutUserPolicy`, `AttachRolePolicy`, and `PutRolePolicy` calls originating from CodeBuild service\
    \ principals\n- **Service Control Policies**: Implement SCPs to prevent CodeBuild service roles from\
    \ modifying IAM policies\n- **IAM Access Analyzer**: Use AWS IAM Access Analyzer to identify privilege\
    \ escalation paths involving CodeBuild batch builds\n- **Regular Audits**: Review CodeBuild projects\
    \ with batch build capabilities to identify those with privileged service roles and restrict access\
    \ accordingly\n- **Tag-Based Access Control**: Tag CodeBuild projects with privilege levels and enforce\
    \ tag-based conditional access policies\n- **Approval Workflows**: Require manual approval for buildspec\
    \ overrides on sensitive CodeBuild projects with privileged service roles"
  limitations: This path provides administrative access only if the existing CodeBuild project's service
    role has administrative permissions (e.g., AdministratorAccess or an equivalent custom policy). If
    the project only has limited permissions, you gain access limited to those permissions. However, even
    limited access may enable multi-hop privilege escalation attacks.
