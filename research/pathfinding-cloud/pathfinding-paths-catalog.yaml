  - iam:getrole
  parent: null
  parent_modification: null
  description: A principal with `iam:PassRole`, `glue:UpdateJob`, and `glue:CreateTrigger` can modify
    an existing AWS Glue job to use an administrative role and execute malicious code, then establish
    a scheduled trigger for persistent automated execution. This scenario demonstrates a stealthy privilege
    escalation vulnerability that combines the stealth of updating existing infrastructure with the persistence
    of scheduled automation. Unlike `glue:CreateJob` which creates new resources that may raise alerts,
    `glue:UpdateJob` modifies existing infrastructure, making detection significantly more difficult.
    Organizations commonly have dozens or hundreds of Glue jobs running legitimate data pipelines, and
    updating existing jobs is a common maintenance activity. When an attacker updates an existing job's
    execution role and script location, then creates a trigger with the `--start-on-creation` flag, they
    establish automated privilege escalation that executes on a schedule (e.g., every minute). The update-based
    approach with persistence is particularly dangerous because it blends into normal operations while
    creating a persistent backdoor. The attacker modifies an existing job to use a privileged role and
    malicious script, creates a scheduled trigger that immediately activates, and the trigger automatically
    executes the job which runs Python code that modifies IAM permissions to grant the starting principal
    administrative access. The trigger continues to run on schedule, re-granting access even if remediated.
  recommendation: "High powered service roles + overly permissive `iam:PassRole` is what makes this privilege\
    \ escalation path exploitable and impactful.\n\n- **Avoid administrative service roles** - Very rarely\
    \ does a Glue job need administrative access. Use the principle of least privilege.\n- **Avoid granting\
    \ `iam:PassRole` on all resources** - Whenever possible, restrict `iam:PassRole` to specific roles\
    \ or specific services.\n\nUse IAM policy conditions to restrict which roles can be passed and to\
    \ which services:\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:PassRole\",\n  \"Resource\"\
    : \"arn:aws:iam::ACCOUNT_ID:role/SpecificGlueRole\",\n  \"Condition\": {\n    \"StringEquals\": {\n\
    \      \"iam:PassedToService\": \"glue.amazonaws.com\"\n    }\n  }\n}\n```\n\n- Monitor CloudTrail\
    \ for unusual Glue job updates followed by immediate trigger creation\n- Monitor CloudTrail for Glue\
    \ job and trigger updates by principals who do not usually update jobs\n- Monitor CloudTrail for roles\
    \ being passed to Glue that haven't been used before\n- Monitor and alert on Glue job updates with\
    \ privileged roles\n- Regularly audit Glue jobs for excessive IAM permissions\n- Regularly audit all\
    \ IAM roles that trust the Glue service and down-scope any roles with administrative access"
  limitations: This path provides administrative access only if the passed role has administrative permissions
    (e.g., AdministratorAccess policy). If only limited roles are available in the environment, you gain
    access limited to those role's permissions. However, even limited access may enable multi-hop attacks
    or access to sensitive data. The persistent nature of triggers means access can be re-granted even
    after remediation attempts if the trigger is not identified and removed.
  references:
  - title: HackTricks - AWS - Glue Privesc
    url: https://cloud.hacktricks.wiki/en/pentesting-cloud/aws-security/aws-privilege-escalation/aws-glue-privesc/index.html#iampassrole-gluecreatejob--glueupdatejob-gluestartjobrun--gluecreatetrigger
  - title: Rhino Security Labs - CloudGoat Glue_privesc Walkthrough
    url: https://rhinosecuritylabs.com/cloud-security/cloudgoat-walkthrough-glue_privesc/
  - title: CloudGoat - glue_privesc Scenario
    url: https://github.com/RhinoSecurityLabs/cloudgoat/tree/master/cloudgoat/scenarios/aws/glue_privesc
