    different CloudTrail events than creating new resources, security monitoring may focus more on resource
    creation than modification, and the attack can blend in with normal job maintenance activities. When
    updating a Glue job, an attacker can change both the IAM role the job uses (via `iam:PassRole`) and
    the script location. By pointing the job to a malicious Python script and passing an administrative
    role, they can execute arbitrary code with elevated privileges when the job runs. The attacker modifies
    an existing job's configuration to use a privileged role and malicious script location, manually starts
    the job execution, and the job executes Python code that modifies IAM permissions to grant the starting
    principal administrative access.
