- id: iam-003
  name: iam:CreateAccessKey + iam:DeleteAccessKey
  category: principal-access
  services:
  - iam
  required_actions:
  - iam:createaccesskey
  - iam:deleteaccesskey
  additional_actions:
  - iam:listusers
  - iam:getuser
  parent: iam-002
  parent_modification: Adds iam:DeleteAccessKey to handle the scenario where the target user already has
    2 access keys (AWS maximum limit)
  description: This is a variation of `iam:CreateAccessKey` that works even when the target user already
    has 2 access keys (the AWS maximum). By combining `iam:CreateAccessKey` with `iam:DeleteAccessKey`,
    an attacker can first delete one of the existing keys, then create a new access key for themselves,
    gaining access to the target user's permissions.
  recommendation: Restrict access to both `iam:CreateAccessKey` and `iam:DeleteAccessKey` using the principle
    of least privilege. The combination of these permissions is particularly dangerous as it bypasses
    the 2-key limit protection. Monitor for sequences where DeleteAccessKey is immediately followed by
    CreateAccessKey for the same user.
  limitations: This path provides administrative access only if the target user or group has administrative
    permissions. The attacker gains whatever permissions the target principal has. If the target has limited
    permissions, the attacker gains limited access. However, even limited access may enable multi-hop
    attacks or access to sensitive data.
  references:
  - title: HackTricks - AWS - IAM Privesc
    url: https://cloud.hacktricks.wiki/en/pentesting-cloud/aws-security/aws-privilege-escalation/aws-iam-privesc/index.html#iamcreateaccesskey
