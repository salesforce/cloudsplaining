- id: bedrock-002
  name: bedrock-agentcore:StartCodeInterpreterSession + bedrock-agentcore:InvokeCodeInterpreter
  category: existing-passrole
  services:
  - bedrock-agentcore
  required_actions:
  - bedrock-agentcore:startcodeinterpretersession
  - bedrock-agentcore:invokecodeinterpreter
  additional_actions:
  - bedrock-agentcore:listcodeinterpreters
  - bedrock-agentcore:getcodeinterpreter
  parent: null
  parent_modification: null
  description: A principal with `bedrock-agentcore:StartCodeInterpreterSession` and `bedrock-agentcore:InvokeCodeInterpreter`
    can access an existing Bedrock AgentCore code interpreter that has a privileged IAM execution role
    attached. By starting a session and invoking arbitrary Python code within the interpreter, an attacker
    can access the MicroVM Metadata Service (MMDS) at 169.254.169.254 to retrieve temporary credentials
    for the interpreter's execution role. This path doesn't require `iam:PassRole` since the role is already
    attached to the existing interpreter. Similar to `lambda:UpdateFunctionCode`, this targets existing
    resources rather than creating new ones.
  recommendation: "Restrict the `bedrock-agentcore:StartCodeInterpreterSession` and `bedrock-agentcore:InvokeCodeInterpreter`\
    \ permissions using resource-based constraints.\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\"\
    : [\n    \"bedrock-agentcore:StartCodeInterpreterSession\",\n    \"bedrock-agentcore:InvokeCodeInterpreter\"\
    \n  ],\n  \"Resource\": \"arn:aws:bedrock-agentcore:REGION:ACCOUNT_ID:code-interpreter/SpecificInterpreter\"\
    \n}\n```\n\nAdditional controls:\n- Monitor CloudTrail for `StartCodeInterpreterSession` and `InvokeCodeInterpreter`\
    \ events on sensitive code interpreters\n- Alert on session creation for interpreters with administrative\
    \ roles\n- Implement resource tags and condition keys to restrict code interpreter usage\n- Regularly\
    \ audit execution roles attached to code interpreters\n- Use SCPs to restrict access to sensitive\
    \ interpreters\n- Enable CloudTrail Data Event logging for code interpreter invocations\n- Implement\
    \ network isolation for code interpreters processing sensitive data\n- Review and minimize execution\
    \ role permissions on existing interpreters"
  limitations: This path provides administrative access only if the target resource's execution role has
    administrative permissions. The attacker gains whatever permissions the resource's role has. If the
    role has limited permissions, the attacker gains limited access. However, even limited access may
    enable multi-hop attacks or access to sensitive data.
  references:
  - title: 'AWS AgentCore: The Overlooked Privilege Escalation Path in Bedrock AI Tooling'
    url: https://sonraisecurity.com/blog/aws-agentcore-privilege-escalation-bedrock-scp-fix/
  - title: 'Sandboxed to Compromised: New Research Exposes Credential Exfiltration Paths in AWS Code Interpreters'
    url: https://sonraisecurity.com/blog/sandboxed-to-compromised-new-research-exposes-credential-exfiltration-paths-in-aws-code-interpreters/
  - title: Understanding Credentials Management in Amazon Bedrock AgentCore
    url: https://docs.aws.amazon.com/bedrock-agentcore/latest/devguide/security-credentials-management.html
