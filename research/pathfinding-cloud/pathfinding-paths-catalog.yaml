  - ecs
  required_actions:
  - iam:passrole
  - ecs:registertaskdefinition
  - ecs:starttask
  additional_actions:
  - ecs:listclusters
  - ecs:describeclusters
  - ecs:listcontainerinstances
  - ecs:describecontainerinstances
  - ecs:describetasks
  - iam:listroles
  - iam:getrole
  parent: null
  parent_modification: null
  description: A principal with `iam:PassRole`, `ecs:RegisterTaskDefinition`, and `ecs:StartTask` can
    create a new ECS task definition and attach an existing privileged IAM role to it, then start the
    task on an existing EC2 container instance. By registering a task definition with a malicious container
    command and starting it on an EC2-based ECS cluster, the attacker can execute arbitrary code with
    the permissions of the attached role, allowing privilege escalation. Unlike `ecs:RunTask` which works
    with both EC2 and Fargate launch types, `ecs:StartTask` is specifically for EC2 launch types and requires
    specifying an existing container instance ARN. This is a classic "pass role to service" privilege
    escalation pattern where the combination of task definition registration, role passing, and task execution
    permissions creates an indirect path to elevated privileges. The level of access gained depends on
    the permissions of the available roles.
  recommendation: "High powered service roles + overly permissive `iam:PassRole` is what makes this privilege\
    \ escalation path exploitable and impactful.\n\n- **Avoid administrative service roles** - Very rarely\
    \ does an ECS task need administrative access. Use the principle of least privilege.\n- **Avoid granting\
    \ `iam:PassRole` on all resources** - Whenever possible, restrict `iam:PassRole` to specific roles\
    \ or specific services.\n\nUse IAM policy conditions to restrict which roles can be passed and to\
    \ which services:\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"iam:PassRole\",\n  \"Resource\"\
    : \"arn:aws:iam::ACCOUNT_ID:role/SpecificECSRole\",\n  \"Condition\": {\n    \"StringEquals\": {\n\
    \      \"iam:PassedToService\": \"ecs-tasks.amazonaws.com\"\n    }\n  }\n}\n```\n\n- Monitor CloudTrail\
    \ for unusual ECS task definition registration followed by immediate task start\n- Monitor CloudTrail\
    \ for ECS task start by principals who do not usually start tasks\n- Monitor CloudTrail for roles\
    \ being passed to ECS that haven't been used before\n- Monitor and alert on ECS task start with privileged\
    \ roles\n- Regularly audit ECS tasks for excessive IAM permissions\n- Regularly audit all IAM roles\
    \ that trust the ECS service and down-scope any roles with administrative access"
  limitations: This path provides administrative access only if the passed role has administrative permissions
    (e.g., AdministratorAccess or an equivalent custom policy). If only limited roles are available, you
    gain access limited to those permissions. However, even limited access may enable multi-hop attacks.
  references:
  - title: AWS ECS Privilege Escalation - HackTricks
    url: https://cloud.hacktricks.wiki/en/pentesting-cloud/aws-security/aws-privilege-escalation/aws-ecs-privesc/index.html#iampassrole-ecsregistertaskdefinition-ecsstarttask
