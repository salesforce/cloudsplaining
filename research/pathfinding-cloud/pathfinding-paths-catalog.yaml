- id: cloudformation-005
  name: cloudformation:CreateChangeSet + cloudformation:ExecuteChangeSet
  category: new-passrole
  services:
  - cloudformation
  - iam
  required_actions:
  - cloudformation:createchangeset
  - cloudformation:executechangeset
  additional_actions:
  - cloudformation:describechangeset
  - cloudformation:describestacks
  - cloudformation:describestackresource
  parent: null
  parent_modification: null
  description: A principal with `cloudformation:CreateChangeSet` and `cloudformation:ExecuteChangeSet`
    permissions can inherit administrative privileges from an existing CloudFormation stack's service
    role. Unlike direct stack updates which require explicit permissions on the resources being modified,
    change set execution bypasses traditional IAM permission checks by delegating all operations to the
    stack's attached service role. If that service role has administrative privileges, an attacker can
    inject malicious infrastructure changes (such as creating a new admin IAM role) through the change
    set mechanism without needing those elevated permissions directly.
  recommendation: "Implement least privilege for CloudFormation permissions - avoid granting `cloudformation:CreateChangeSet`\
    \ and `cloudformation:ExecuteChangeSet` together unless absolutely necessary.\n\nUse resource-based\
    \ conditions to restrict change set operations to specific stacks:\n\n```json\n{\n  \"Effect\": \"\
    Allow\",\n  \"Action\": [\n    \"cloudformation:CreateChangeSet\",\n    \"cloudformation:ExecuteChangeSet\"\
    \n  ],\n  \"Resource\": \"arn:aws:cloudformation:REGION:ACCOUNT_ID:stack/SpecificStack/*\",\n  \"\
    Condition\": {\n    \"StringEquals\": {\n      \"aws:ResourceTag/Environment\": \"dev\"\n    }\n \
    \ }\n}\n```\n\nAdditional controls:\n- Review CloudFormation stack service roles and minimize permissions\
    \ - avoid using AdministratorAccess for stack service roles\n- Implement Service Control Policies\
    \ (SCPs) to prevent change set execution on stacks with privileged service roles from non-admin principals\n\
    - Monitor CloudTrail for `CreateChangeSet` and `ExecuteChangeSet` API calls, especially on stacks\
    \ with elevated permissions\n- Enable MFA requirements for sensitive CloudFormation operations using\
    \ condition keys like `aws:MultiFactorAuthPresent`\n- Use IAM Access Analyzer to identify CloudFormation\
    \ stacks with overly permissive service roles\n- Consider using stack policies to prevent modifications\
    \ to critical infrastructure resources\n- Review and audit the AWS managed policy `SecretsManagerReadWrite`\
    \ - consider creating a custom policy without CloudFormation permissions if change set operations\
    \ aren't required\n- Implement CloudWatch alarms on CloudFormation change set creation and execution\
    \ events for automated detection\n- Use CloudFormation drift detection to identify unexpected stack\
    \ modifications\n- Establish approval workflows for change set execution on production stacks using\
    \ AWS Service Catalog or custom automation"
  limitations: This path provides administrative access only if the target CloudFormation stack's service
    role has administrative permissions. The attacker gains whatever permissions the stack's service role
    has. If the role has limited permissions, the attacker gains limited access. However, even limited
    access may enable multi-hop attacks or access to sensitive data.
  references:
  - title: 'Fighting the Previous War (aka: Attacking and Defending in the Era of the Cloud)'
    url: https://www.youtube.com/watch?v=OaEU_5dh9Bc
