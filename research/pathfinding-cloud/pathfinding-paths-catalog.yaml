  description: Anyone with access to `iam:UpdateAssumeRolePolicy` can modify the trust policy of any role
    they have this permission  on. This permission is often abused by one principal to modify a privileged
    role's trust policy to allow themselves to assume   it, thereby gaining access to the privileged role's
    permissions. You might think that you would also need `sts:AssumeRole` permission to exploit this,
    but if you update the role policy of the target role to trust you explicitly (your full arn, not ACCOUNT_ID:root),
    then you do not need sts:AssumeRole permission to assume the role.
  recommendation: Restrict access to `iam:UpdateAssumeRolePolicy` using the principle of least privilege.
    Very few principals need this permission, so it should be restricted to only the few principals that
    need it. Monitor use of this sensitive permission using CloudSIEM detections, and look for usage anomalies.
  limitations: This path provides administrative access only if the attacker modifies a role that has
    administrative permissions. The attacker gains whatever permissions the modified role has. If the
    role has limited permissions, the attacker gains limited access. However, even limited access may
    enable multi-hop attacks.
