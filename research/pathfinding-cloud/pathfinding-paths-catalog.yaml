- id: ec2instanceconnect-003
  name: ec2-instance-connect:SendSSHPublicKey
  category: existing-passrole
  services:
  - ec2
  - ec2-instance-connect
  required_actions:
  - ec2-instance-connect:sendsshpublickey
  - ec2:describeinstances
  additional_actions: []
  parent: null
  parent_modification: null
  description: A principal with `ec2-instance-connect:SendSSHPublicKey` can push a temporary SSH public
    key to an EC2 instance and establish an SSH connection. If the target EC2 instance has a privileged
    IAM role attached via an instance profile, the attacker can SSH into the instance and access the instance
    metadata service (IMDS) to retrieve temporary credentials for that role. This provides the attacker
    with the full permissions of the instance's IAM role.
  recommendation: "Restrict the `ec2-instance-connect:SendSSHPublicKey` permission using resource-based\
    \ constraints.\n\n```json\n{\n  \"Effect\": \"Allow\",\n  \"Action\": \"ec2-instance-connect:SendSSHPublicKey\"\
    ,\n  \"Resource\": \"arn:aws:ec2:REGION:ACCOUNT_ID:instance/i-specificinstance\",\n  \"Condition\"\
    : {\n    \"StringEquals\": {\n      \"ec2:osuser\": \"ec2-user\"\n    }\n  }\n}\n```\n\nAdditional\
    \ controls:\n- Use security groups to restrict SSH access to known IP ranges\n- Monitor CloudTrail\
    \ for `SendSSHPublicKey` events, especially to instances with privileged roles\n- Implement IMDSv2\
    \ (session-oriented) to make credential theft more difficult\n- Use AWS Systems Manager Session Manager\
    \ instead of SSH for remote access\n- Alert on unusual SSH connections to sensitive instances\n- Consider\
    \ disabling EC2 Instance Connect on instances with privileged roles\n- Use VPC endpoints to restrict\
    \ IMDS access"
  limitations: This path provides administrative access only if the target resource's execution role has
    administrative permissions. The attacker gains whatever permissions the resource's role has. If the
    role has limited permissions, the attacker gains limited access. However, even limited access may
    enable multi-hop attacks or access to sensitive data.
  references:
  - title: IAM Vulnerable - EC2 Instance Connect
    url: https://github.com/BishopFox/iam-vulnerable
  - title: HackTricks - AWS - EC2 Privesc
    url: https://cloud.hacktricks.wiki/en/pentesting-cloud/aws-security/aws-privilege-escalation/aws-ec2-privesc/index.html#ec2-instance-connectsendsshpublickey
